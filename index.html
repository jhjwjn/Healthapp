<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="운동루틴">
<meta name="theme-color" id="theme-color-meta" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>우리 운동 루틴</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ── THEMES ── */
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;
  --accent:#C8FF00;--accent-dim:rgba(200,255,0,0.12);--accent-border:rgba(200,255,0,0.3);
  --text:#f0f0f0;--text2:#888;--text3:#444;--red:#ff4444;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
body.t-red{--bg:#080000;--surface:#140000;--surface2:#1e0000;--border:#360e0e;--accent:#FF3030;--accent-dim:rgba(255,48,48,0.12);--accent-border:rgba(255,48,48,0.3);--text:#f5efef;--text2:#995555;--text3:#552222;}
body.t-navy{--bg:#05070e;--surface:#0c1020;--surface2:#141828;--border:#1e2a40;--accent:#D4AF37;--accent-dim:rgba(212,175,55,0.12);--accent-border:rgba(212,175,55,0.3);--text:#e6e9f0;--text2:#5566aa;--text3:#2a3860;}
body.t-white{--bg:#f4f4f2;--surface:#ffffff;--surface2:#ebebea;--border:#d8d8d4;--accent:#0d0d0d;--accent-dim:rgba(13,13,13,0.07);--accent-border:rgba(13,13,13,0.18);--text:#0d0d0d;--text2:#666662;--text3:#aaaaaa;--red:#cc2222;}

/* ── BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
.pad{padding:16px 20px;padding-bottom:calc(72px + var(--safe-bottom));}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.pill{height:30px;padding:0 12px;border-radius:20px;border:1px solid var(--accent-border);background:var(--accent-dim);color:var(--accent);font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;}
.ghost-btn{height:30px;padding:0 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}

/* ── BOTTOM NAV ── */
.nav{display:flex;align-items:center;border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);flex-shrink:0;background:var(--bg);height:calc(56px + var(--safe-bottom));}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:100%;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:9px;font-family:'Noto Sans KR',sans-serif;}
.nav-btn svg{width:20px;height:20px;}
.nav-btn.on{color:var(--accent);}
.nav-start{flex:1.4;height:40px;margin:0 8px;border-radius:20px;background:var(--accent);border:none;color:var(--bg);font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .15s;}
.nav-start:disabled{opacity:.3;}
.nav-start:active{opacity:.8;}

/* ── HOME ── */
.streak-bar{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:16px;}
.streak-fire{font-size:28px;line-height:1;}
.streak-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);line-height:1;}
.streak-label{font-size:12px;color:var(--text2);}
.streak-days{display:flex;gap:4px;margin-top:4px;}
.streak-d{width:20px;height:20px;border-radius:5px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);}
.streak-d.hit{background:var(--accent);color:var(--bg);font-weight:700;}

.week-toggle{display:flex;gap:8px;margin-bottom:16px;}
.w-btn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;}
.w-btn.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:500;}

.day-tabs{display:flex;gap:5px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;}
.day-tabs::-webkit-scrollbar{display:none;}
.d-tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;}
.d-tab span{font-size:12px;font-weight:500;color:var(--text2);}
.d-tab i{width:4px;height:4px;border-radius:50%;background:transparent;}
.d-tab.hw i{background:var(--text3);}
.d-tab.on{border-color:var(--accent);background:var(--accent-dim);}
.d-tab.on span{color:var(--accent);}
.d-tab.on i{background:var(--accent);}

/* preview card */
.preview-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px;}
.preview-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
.preview-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;}
.preview-tag{font-size:10px;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border);padding:2px 8px;border-radius:20px;}
.preview-ex-list{padding:0 16px 14px;}
.preview-ex{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--border);}
.preview-ex-num{font-size:11px;color:var(--text3);width:20px;text-align:right;flex-shrink:0;}
.preview-ex-name{flex:1;font-size:14px;font-weight:500;}
.preview-ex-pr{font-size:11px;color:var(--accent);}
.preview-ex-prev{font-size:11px;color:var(--text2);}

.rest-state{text-align:center;padding:48px 0 24px;color:var(--text3);}
.rest-icon{font-size:44px;margin-bottom:10px;}

/* quick link */
.quick-link{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;cursor:pointer;}
.quick-link:active{border-color:var(--accent);}
.ql-left{display:flex;align-items:center;gap:8px;}
.ql-dots{display:flex;gap:3px;}
.ql-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.3;}
.ql-dot.on{opacity:1;}

/* ── WORKOUT MODE (fullscreen) ── */
#screen-workout{background:var(--bg);z-index:50;}
.wk-header{padding:14px 20px 0;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.wk-close{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.wk-progress-wrap{flex:1;}
.wk-progress-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
.wk-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.wk-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}
.wk-timer-badge{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--text2);letter-spacing:1px;}

.wk-body{flex:1;overflow-y:auto;padding:20px 20px 0;}
.wk-body::-webkit-scrollbar{display:none;}

.wk-ex-label{font-size:11px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.wk-ex-name{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:1px;line-height:1;margin-bottom:4px;}
.wk-ex-sub{font-size:13px;color:var(--text2);margin-bottom:20px;}

.wk-set-indicator{display:flex;gap:6px;margin-bottom:20px;}
.wk-set-pip{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s;}
.wk-set-pip.done{background:var(--accent);}
.wk-set-pip.current{background:var(--accent);opacity:.5;}

/* current set card */
.wk-set-card{background:var(--surface);border:1px solid var(--accent-border);border-radius:20px;padding:20px;margin-bottom:16px;}
.wk-set-title{font-size:11px;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;}
.wk-inputs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.wk-input-block{display:flex;flex-direction:column;gap:6px;}
.wk-input-label{font-size:11px;color:var(--text2);}
.wk-input-row{display:flex;align-items:center;gap:8px;}
.wk-adj{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.wk-adj:active{border-color:var(--accent);}
.wk-val{flex:1;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;}
.wk-pr-badge{display:inline-flex;align-items:center;gap:4px;background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--accent);margin-bottom:12px;}
.wk-prev{font-size:12px;color:var(--text2);text-align:center;margin-bottom:4px;}

.wk-done-btn{width:100%;padding:18px;border-radius:14px;background:var(--accent);border:none;color:var(--bg);font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:transform .1s;}
.wk-done-btn:active{transform:scale(.97);}

/* rest timer overlay */
.rest-overlay{display:none;position:absolute;inset:0;background:var(--bg);z-index:10;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
.rest-overlay.show{display:flex;}
.rest-ring-wrap{position:relative;width:200px;height:200px;margin-bottom:24px;}
.rest-ring-wrap svg{position:absolute;inset:0;transform:rotate(-90deg);}
.rest-ring-bg{fill:none;stroke:var(--border);stroke-width:6;}
.rest-ring-fill{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .9s linear;}
.rest-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.rest-sec{font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:2px;color:var(--accent);line-height:1;}
.rest-lbl{font-size:12px;color:var(--text2);}
.rest-actions{display:flex;gap:10px;width:100%;}
.rest-skip{flex:1;padding:14px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.rest-add{padding:14px 20px;border-radius:12px;border:1px solid var(--accent-border);background:var(--accent-dim);color:var(--accent);font-size:15px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* next exercise hint */
.wk-next{background:var(--surface);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.wk-next-label{font-size:11px;color:var(--text3);}
.wk-next-name{font-size:13px;font-weight:500;}

/* media controls */
.media-bar{display:flex;align-items:center;justify-content:center;gap:20px;padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0;}
.media-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.media-btn.play{width:48px;height:48px;background:var(--accent);border-color:var(--accent);color:var(--bg);}
.media-btn:active{opacity:.7;}
.media-track{flex:1;text-align:center;}
.media-track-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.media-track-sub{font-size:10px;color:var(--text2);}

/* ── HISTORY (calendar + stats) ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px;}
.cal-dow{text-align:center;font-size:10px;color:var(--text3);padding:5px 0;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .15s;position:relative;}
.cal-day.empty{cursor:default;}
.cal-day.today{border-color:var(--accent-border);}
.cal-day.has-r{background:var(--accent-dim);}
.cal-day.sel{background:var(--accent);}
.cal-day-n{font-size:12px;font-weight:500;color:var(--text2);}
.cal-day.today .cal-day-n{color:var(--accent);}
.cal-day.has-r .cal-day-n{color:var(--text);}
.cal-day.sel .cal-day-n{color:var(--bg);font-weight:700;}
.cal-dot{width:3px;height:3px;border-radius:50%;background:var(--accent);margin-top:1px;}
.cal-day.sel .cal-dot{background:var(--bg);}

/* stats cards */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
.stat-label{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);letter-spacing:1px;line-height:1;}
.stat-sub{font-size:11px;color:var(--text2);margin-top:2px;}

/* volume chart */
.vol-chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:16px;}
.vol-chart-title{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
.vol-bars{display:flex;align-items:flex-end;gap:4px;height:80px;}
.vol-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.vol-bar{width:100%;border-radius:4px 4px 0 0;background:var(--border);transition:height .5s ease;min-height:4px;}
.vol-bar.this{background:var(--accent);}
.vol-bar-label{font-size:9px;color:var(--text3);}

/* record detail */
.rec-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.rec-date{font-size:11px;color:var(--accent);font-weight:500;margin-bottom:4px;}
.rec-session{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:2px;}
.rec-duration{font-size:11px;color:var(--text2);margin-bottom:10px;}
.rec-photo{width:100%;border-radius:8px;margin-bottom:10px;object-fit:cover;max-height:200px;display:block;}
.rec-note{font-size:12px;color:var(--text2);line-height:1.6;white-space:pre-wrap;padding:8px 10px;background:var(--surface2);border-radius:8px;margin-bottom:10px;}
.rec-ex-block{margin-bottom:8px;}
.rec-ex-name{font-size:13px;font-weight:500;margin-bottom:3px;display:flex;align-items:center;gap:6px;}
.rec-pr-tag{font-size:10px;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border);padding:1px 6px;border-radius:10px;}
.rec-set-row{font-size:11px;color:var(--text2);padding:2px 0;display:flex;gap:8px;}
.rec-set-n{color:var(--text3);width:28px;}
.rec-actions{display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.rec-act-btn{flex:1;padding:9px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;}
.rec-act-btn:active{border-color:var(--accent);color:var(--accent);}
.rec-del{padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.rec-del:active{border-color:var(--red);color:var(--red);}
.no-rec{text-align:center;padding:28px 0;color:var(--text3);font-size:13px;}

/* monthly report */
.report-btn{width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:6px;}
.report-btn:active{border-color:var(--accent);color:var(--accent);}

/* ── SETTINGS ── */
.settings-sec{margin-bottom:24px;}
.settings-sec-title{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.theme-card{padding:14px;border-radius:12px;border:1.5px solid var(--border);cursor:pointer;transition:border-color .2s;position:relative;}
.theme-card.on{border-color:var(--accent);}
.theme-preview{display:flex;gap:4px;margin-bottom:8px;}
.tp{width:18px;height:18px;border-radius:50%;}
.theme-name{font-size:12px;font-weight:500;}
.theme-check{position:absolute;top:10px;right:10px;width:16px;height:16px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;font-size:9px;color:var(--bg);}
.theme-card.on .theme-check{display:flex;}

.set-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.set-row-label{font-size:13px;}
.set-row-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.set-row-right{font-size:12px;color:var(--accent);}

.rest-options{display:flex;gap:8px;margin-top:10px;}
.rest-opt{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:center;transition:all .15s;}
.rest-opt.on{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}

/* ── MODALS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 0;flex-shrink:0;}
.sheet-hdr{padding:12px 18px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.sheet-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;}
.sheet-body{flex:1;overflow-y:auto;padding:14px 18px;}
.sheet-body::-webkit-scrollbar{display:none;}
.sheet-ftr{padding:10px 18px;padding-bottom:calc(10px + var(--safe-bottom));border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;background:var(--surface);}
.s-cancel{flex:1;padding:13px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.s-save{flex:2;padding:13px;border-radius:11px;border:none;background:var(--accent);color:var(--bg);font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* record sheet */
.sum-block{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:14px;}
.sum-lbl{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.sum-ex-row{margin-bottom:6px;}
.sum-ex-name{font-size:13px;font-weight:500;margin-bottom:1px;}
.sum-ex-sets{font-size:11px;color:var(--text2);}
.photo-area{border:1.5px dashed var(--border);border-radius:10px;padding:18px;text-align:center;cursor:pointer;margin-bottom:12px;display:block;}
.photo-area p{font-size:12px;color:var(--text3);margin-top:4px;}
.photo-prev{width:100%;border-radius:8px;margin-bottom:12px;display:none;}
.photo-prev.show{display:block;}
.note-area{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'Noto Sans KR',sans-serif;resize:none;outline:none;line-height:1.6;margin-bottom:6px;}
.note-area:focus{border-color:var(--accent);}

/* edit sheet */
.e-sec{margin-bottom:20px;}
.e-sec-title{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.e-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.e-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;}
.e-input:focus{border-color:var(--accent);}
.e-del{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.e-del:active{border-color:var(--red);color:var(--red);}
.e-add{width:100%;padding:9px;border-radius:9px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.name-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:14px;font-weight:500;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:4px;}
.name-input:focus{border-color:var(--accent);}
.danger-btn{width:100%;padding:11px;border-radius:9px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* ── CELEBRATION OVERLAY ── */
.celebrate{display:none;position:fixed;inset:0;z-index:200;pointer-events:none;overflow:hidden;}
.celebrate.show{display:block;}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:fall linear forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(72px + var(--safe-bottom) + 10px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface2);border:1px solid var(--border);padding:9px 18px;border-radius:18px;font-size:12px;color:var(--text);opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* util */
.mt8{margin-top:8px;}
.divider{height:1px;background:var(--border);margin:16px 0;}
</style>
</head>
<body>
<div id="app">

  <!-- ══ HOME ══ -->
  <div class="screen active" id="screen-home">
    <div class="topbar">
      <div><div class="topbar-title">WORKOUT</div><div class="topbar-sub" id="home-date"></div></div>
      <button class="pill" id="week-pill">1주차</button>
    </div>
    <div class="scroll pad" id="home-body"></div>
  </div>

  <!-- ══ WORKOUT MODE ══ -->
  <div class="screen" id="screen-workout" style="position:relative;">
    <div class="wk-header">
      <button class="wk-close" onclick="exitWorkout()">✕</button>
      <div class="wk-progress-wrap">
        <div class="wk-progress-label" id="wk-prog-label">1/4 종목</div>
        <div class="wk-bar"><div class="wk-bar-fill" id="wk-bar-fill" style="width:0%"></div></div>
      </div>
      <div class="wk-timer-badge" id="wk-elapsed">00:00</div>
    </div>
    <div class="wk-body" id="wk-body"></div>
    <div class="media-bar" id="media-bar">
      <button class="media-btn" onclick="mediaPrev()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>

      <button class="media-btn play" id="media-play-btn" onclick="mediaToggle()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" id="media-play-icon"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="media-btn" onclick="mediaNext()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm8.5-6v6h2V6h-2v6z"/></svg>
      </button>
    </div>
    <!-- rest overlay -->
    <div class="rest-overlay" id="rest-overlay">
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px;letter-spacing:.08em;text-transform:uppercase;">휴식 중</div>
      <div class="rest-ring-wrap">
        <svg viewBox="0 0 200 200" width="200" height="200">
          <circle class="rest-ring-bg" cx="100" cy="100" r="88"/>
          <circle class="rest-ring-fill" id="rest-ring" cx="100" cy="100" r="88"/>
        </svg>
        <div class="rest-num">
          <div class="rest-sec" id="rest-sec">60</div>
          <div class="rest-lbl">초 후 다음 세트</div>
        </div>
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:20px;" id="rest-next-hint"></div>
      <div class="rest-actions">
        <button class="rest-skip" onclick="skipRest()">쉬는 시간 건너뛰기</button>
        <button class="rest-add" onclick="addRest(30)">+30초</button>
      </div>
    </div>
  </div>

  <!-- ══ HISTORY ══ -->
  <div class="screen" id="screen-history">
    <div class="topbar">
      <div><div class="topbar-title">RECORDS</div><div class="topbar-sub" id="cal-label"></div></div>
      <div style="display:flex;gap:6px;">
        <button class="ghost-btn" onclick="changeMonth(-1)">‹</button>
        <button class="ghost-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="scroll pad" id="history-body"></div>
  </div>

  <!-- ══ SETTINGS ══ -->
  <div class="screen" id="screen-settings">
    <div class="topbar"><div><div class="topbar-title">SETTINGS</div><div class="topbar-sub">설정</div></div></div>
    <div class="scroll pad" id="settings-body"></div>
  </div>

  <!-- ══ BOTTOM NAV ══ -->
  <nav class="nav">
    <button class="nav-btn on" id="nav-home" onclick="showScreen('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>홈
    </button>
    <button class="nav-start" id="nav-start-btn" onclick="startWorkout()" disabled>▶ 운동 시작</button>
    <button class="nav-btn" id="nav-history" onclick="showScreen('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>기록
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showScreen('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>설정
    </button>

</div>

<!-- RECORD SHEET -->

  <div class="sheet">

<!-- CELEBRATE -->

<script>
// ══════════════════════════════════════
// CONSTANTS & THEMES
// ══════════════════════════════════════
const THEMES=[
  {id:'dark', name:'다크 라임',  cls:'',      bg:'#0a0a0a',acc:'#C8FF00',p:['#0a0a0a','#141414','#C8FF00']},
  {id:'red',  name:'블랙 레드',  cls:'t-red', bg:'#080000',acc:'#FF3030',p:['#080000','#140000','#FF3030']},
  {id:'navy', name:'네이비 골드',cls:'t-navy',bg:'#05070e',acc:'#D4AF37',p:['#05070e','#0c1020','#D4AF37']},
  {id:'white',name:'화이트',     cls:'t-white',bg:'#f4f4f2',acc:'#0d0d0d',p:['#f4f4f2','#ffffff','#0d0d0d']},
];
const DAYS=['일','월','화','수','목','금','토'];
const DAYS_F=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
const DEFAULT_ROUTINES={
  '1-1':{name:'가슴 너비',exercises:['펙덱 플라이','케이블 플라이','덤벨 프레스','인클라인 벤치프레스']},
  '1-3':{name:'등 너비',exercises:['랫풀다운 (중립)','랫풀다운 (와이드)','암풀다운','덤벨로우']},
  '1-5':{name:'하체',exercises:['스쿼트','레그 익스텐션','런지']},
  '1-0':{name:'어깨',exercises:['사이드 레터럴 레이즈','페이스 폴','밀리터리 프레스']},
  '2-1':{name:'가슴 두께',exercises:['인클라인 벤치 프레스','인클라인 덤벨 프레스','펙덱 플라이']},
  '2-3':{name:'등 두께',exercises:['바벨로우','T바로우','덤벨로우','랫풀다운']},
  '2-5':{name:'하체',exercises:['스쿼트','레그 익스텐션','런지']},
  '2-0':{name:'어깨',exercises:['사이드 레터럴 레이즈','페이스 폴','밀리터리 프레스']},
};

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let routines={}, state={week:1,activeDay:new Date().getDay()};
let currentTheme=localStorage.getItem('theme')||'dark';
let restTime=parseInt(localStorage.getItem('restTime')||'60');

// PR store: { 'exName': { weight, reps, date } }
function getPRs(){try{return JSON.parse(localStorage.getItem('prs')||'{}');}catch(e){return {};}}
function savePRs(p){try{localStorage.setItem('prs',JSON.stringify(p));}catch(e){}}
function getHist(){try{return JSON.parse(localStorage.getItem('hist_v4')||'[]');}catch(e){return [];}}
function saveHist(h){try{localStorage.setItem('hist_v4',JSON.stringify(h));}catch(e){}}

function loadData(){
  try{const r=localStorage.getItem('rt_v4');routines=r?JSON.parse(r):JSON.parse(JSON.stringify(DEFAULT_ROUTINES));}
  catch(e){routines=JSON.parse(JSON.stringify(DEFAULT_ROUTINES));}
  try{const s=localStorage.getItem('st_v4');if(s)Object.assign(state,JSON.parse(s));}catch(e){}
}
function saveR(){try{localStorage.setItem('rt_v4',JSON.stringify(routines));}catch(e){}}
function saveS(){try{localStorage.setItem('st_v4',JSON.stringify(state));}catch(e){}}

function rKey(){return state.week+'-'+state.activeDay;}
function getR(){return routines[rKey()]||null;}

// previous record lookup
function getPrevRecord(exName){
  const hist=getHist();
  for(const r of hist){
    if(r.exercises&&r.exercises[exName]&&r.exercises[exName].length>0){
      return r.exercises[exName];
    }
  }
  return null;
}

// streak calculation
function getStreak(){
  const hist=getHist();
  if(!hist.length)return 0;
  const dates=new Set(hist.map(r=>r.date.slice(0,10)));
  let streak=0,d=new Date();
  d.setHours(0,0,0,0);
  // if today not done, start from yesterday
  const todayStr=d.toISOString().slice(0,10);
  if(!dates.has(todayStr)){d.setDate(d.getDate()-1);}
  while(true){
    const s=d.toISOString().slice(0,10);
    if(!dates.has(s))break;
    streak++;
    d.setDate(d.getDate()-1);
  }
  return streak;
}

// ══════════════════════════════════════
// THEME
// ══════════════════════════════════════
function applyTheme(id){
  currentTheme=id;
  const t=THEMES.find(x=>x.id===id)||THEMES[0];
  document.body.className=t.cls;
  document.getElementById('theme-color-meta').content=t.bg;
  localStorage.setItem('theme',id);
}

// ══════════════════════════════════════
// SCREEN ROUTING
// ══════════════════════════════════════
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('screen-'+name).classList.add('active');
  const nb=document.getElementById('nav-'+name);
  if(nb)nb.classList.add('on');
  if(name==='history'){calSel=null;renderHistory();}
  if(name==='settings')renderSettings();
  if(name==='home')renderHome();
}

// ══════════════════════════════════════
// HOME
// ══════════════════════════════════════
function renderHome(){
  const body=document.getElementById('home-body');
  const routine=getR();
  const now=new Date();
  document.getElementById('home-date').textContent=now.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'});
  document.getElementById('week-pill').textContent=state.week+'주차';

  const streak=getStreak();
  const hist=getHist();
  const monthCount=hist.filter(r=>{const d=new Date(r.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;

  // streak bar
  const recentDays=[];
  for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);recentDays.push(d);}
  const doneDates=new Set(hist.map(r=>r.date.slice(0,10)));
  const streakDots=recentDays.map(d=>{
    const s=d.toISOString().slice(0,10);
    const hit=doneDates.has(s);
    return `<div class="streak-d ${hit?'hit':''}">${DAYS[d.getDay()]}</div>`;
  }).join('');

  let h=`<div class="streak-bar">
    <div class="streak-fire">${streak>0?'🔥':'💤'}</div>
    <div style="flex:1;">
      <div style="display:flex;align-items:baseline;gap:6px;">
        <div class="streak-num">${streak}</div>
        <div class="streak-label">일 연속</div>
        <div style="margin-left:auto;font-size:11px;color:var(--text2);">이번 달 ${monthCount}회</div>
      </div>
      <div class="streak-days">${streakDots}</div>
    </div>
  </div>`;

  // quick history link
  h+=`<div class="quick-link" onclick="showScreen('history')">
    <div class="ql-left">
      <div class="ql-dots">${Array.from({length:5},(_,i)=>`<div class="ql-dot ${i<monthCount?'on':''}"></div>`).join('')}</div>
      <span style="font-size:12px;color:var(--text2);">기록 보기</span>
    </div>
    <span style="color:var(--text3);font-size:14px;">›</span>
  </div>`;

  // week & day
  h+=`<div class="week-toggle">
    <button class="w-btn ${state.week===1?'on':''}" onclick="setWeek(1)">1주차</button>
    <button class="w-btn ${state.week===2?'on':''}" onclick="setWeek(2)">2주차</button>
  </div><div class="day-tabs">`;
  DAYS.forEach((d,i)=>{
    const hw=!!routines[state.week+'-'+i];
    h+=`<button class="d-tab ${hw?'hw':''} ${i===state.activeDay?'on':''}" onclick="setDay(${i})"><span>${d}</span><i></i></button>`;
  });
  h+='</div>';

  // routine preview
  if(!routine){
    h+=`<div class="rest-state"><div class="rest-icon">🛌</div><p style="font-size:14px;margin-bottom:16px;">등록된 루틴이 없어요</p>
      <button class="ghost-btn" style="margin:0 auto;" onclick="openEditSheet()">+ 루틴 추가</button></div>`;
    document.getElementById('nav-start-btn').disabled=true;
    body.innerHTML=h; return;
  }

  const prs=getPRs();
  h+=`<div class="preview-card">
    <div class="preview-header">
      <div>
        <div class="preview-name">${routine.name}</div>
        <span class="preview-tag">${DAYS_F[state.activeDay]} · ${state.week}주차</span>
      </div>
      <button class="ghost-btn" onclick="openEditSheet()">✎ 편집</button>
    </div>
    <div class="preview-ex-list">`;

  routine.exercises.forEach((ex,i)=>{
    const pr=prs[ex];
    const prev=getPrevRecord(ex);
    const prevStr=prev?`이전: ${prev[0].weight||'?'}kg`:'';
    const prStr=pr?`PR ${pr.weight}kg`:'';
    h+=`<div class="preview-ex">
      <span class="preview-ex-num">${i+1}</span>
      <span class="preview-ex-name">${ex}</span>
      ${prStr?`<span class="preview-ex-pr">${prStr}</span>`:''}
      ${prevStr&&!prStr?`<span class="preview-ex-prev">${prevStr}</span>`:''}
    </div>`;
  });

  h+=`</div></div>`;
  body.innerHTML=h;
  document.getElementById('nav-start-btn').disabled=false;
}

function setWeek(w){state.week=w;saveS();renderHome();}
function setDay(d){state.activeDay=d;saveS();renderHome();}

// ══════════════════════════════════════
// WORKOUT MODE
// ══════════════════════════════════════
let wk={
  routine:null, exIdx:0, setIdx:0,
  sets:{},   // { exName: [{weight,reps,done},...] }
  elapsed:0, elapsedTimer:null,
  restTimer:null, restRemain:0, restTotal:0,
};

function startWorkout(){
  const r=getR();
  if(!r)return;
  wk.routine=JSON.parse(JSON.stringify(r));
  wk.exIdx=0; wk.setIdx=0; wk.sets={};

  // initialize sets from previous records
  const prs=getPRs();
  r.exercises.forEach(ex=>{
    const prev=getPrevRecord(ex);
    const defaultSets=3;
    wk.sets[ex]=Array.from({length:defaultSets},(_,i)=>{
      const ps=prev&&prev[i]?prev[i]:{weight:'',reps:''};
      return {weight:ps.weight||'',reps:ps.reps||'',done:false};
    });
  });

  wk.elapsed=0;
  clearInterval(wk.elapsedTimer);
  wk.elapsedTimer=setInterval(()=>{
    wk.elapsed++;
    const m=String(Math.floor(wk.elapsed/60)).padStart(2,'0');
    const s=String(wk.elapsed%60).padStart(2,'0');
    const el=document.getElementById('wk-elapsed');
    if(el)el.textContent=`${m}:${s}`;
  },1000);

  showScreen('workout');
  renderWorkout();
  setupMediaSession();
}

function renderWorkout(){
  const r=wk.routine; if(!r)return;
  const exs=r.exercises;
  const ex=exs[wk.exIdx];
  const sets=wk.sets[ex]||[];
  const prs=getPRs();
  const pr=prs[ex];

  // progress
  const totalSets=Object.values(wk.sets).reduce((a,s)=>a+s.length,0);
  const doneSets=Object.values(wk.sets).reduce((a,s)=>a+s.filter(x=>x.done).length,0);
  const pct=totalSets>0?Math.round(doneSets/totalSets*100):0;
  document.getElementById('wk-bar-fill').style.width=pct+'%';
  document.getElementById('wk-prog-label').textContent=`${wk.exIdx+1}/${exs.length} 종목`;

  // set pips
  const pips=sets.map((s,i)=>`<div class="wk-set-pip ${s.done?'done':i===wk.setIdx?'current':''}"></div>`).join('');

  // current set
  const cs=sets[wk.setIdx]||{weight:'',reps:''};
  const prevRec=getPrevRecord(ex);
  const prevSetStr=prevRec&&prevRec[wk.setIdx]?`지난번: ${prevRec[wk.setIdx].weight||'?'}kg × ${prevRec[wk.setIdx].reps||'?'}회`:'';

  // next hint
  let nextHint='';
  if(wk.setIdx<sets.length-1){
    nextHint=`<div class="wk-next"><div><div class="wk-next-label">다음 세트</div><div class="wk-next-name">${ex} ${wk.setIdx+2}세트</div></div></div>`;
  } else if(wk.exIdx<exs.length-1){
    nextHint=`<div class="wk-next"><div><div class="wk-next-label">다음 종목</div><div class="wk-next-name">${exs[wk.exIdx+1]}</div></div></div>`;
  }

  const isLastSet=wk.setIdx>=sets.length-1;
  const isLastEx=wk.exIdx>=exs.length-1;
  const btnLabel=isLastSet&&isLastEx?'운동 완료 🎉':`세트 완료`;

  let h=`
    <div class="wk-ex-label">종목 ${wk.exIdx+1}/${exs.length}</div>
    <div class="wk-ex-name">${ex}</div>
    <div class="wk-ex-sub">${wk.setIdx+1} / ${sets.length} 세트</div>
    <div class="wk-set-indicator">${pips}</div>
    <div class="wk-set-card">
      <div class="wk-set-title">${wk.setIdx+1}세트</div>
      ${pr?`<div class="wk-pr-badge">🏆 PR ${pr.weight}kg × ${pr.reps}회</div>`:''}
      ${prevSetStr?`<div class="wk-prev">${prevSetStr}</div>`:''}
      <div class="wk-inputs">
        <div class="wk-input-block">
          <div class="wk-input-label">중량 (kg)</div>
          <div class="wk-input-row">
            <button class="wk-adj" onclick="adjVal('weight',-2.5)">−</button>
            <div class="wk-val" id="wk-weight">${cs.weight||0}</div>
            <button class="wk-adj" onclick="adjVal('weight',2.5)">+</button>
          </div>
        </div>
        <div class="wk-input-block">
          <div class="wk-input-label">횟수</div>
          <div class="wk-input-row">
            <button class="wk-adj" onclick="adjVal('reps',-1)">−</button>
            <div class="wk-val" id="wk-reps">${cs.reps||0}</div>
            <button class="wk-adj" onclick="adjVal('reps',1)">+</button>
          </div>
        </div>
      </div>
      <button class="wk-done-btn" onclick="completeSet()">${btnLabel}</button>
    </div>
    ${nextHint}
    <div style="height:16px;"></div>`;

  document.getElementById('wk-body').innerHTML=h;
}

function adjVal(field,delta){
  const ex=wk.routine.exercises[wk.exIdx];
  const set=wk.sets[ex][wk.setIdx];
  const cur=parseFloat(set[field])||0;
  const nv=Math.max(0,Math.round((cur+delta)*10)/10);
  set[field]=nv;
  document.getElementById('wk-'+field).textContent=nv;
  haptic();
}

function completeSet(){
  const exs=wk.routine.exercises;
  const ex=exs[wk.exIdx];
  const set=wk.sets[ex][wk.setIdx];
  set.done=true;
  haptic('medium');

  // check PR
  checkPR(ex,set);

  const isLastSet=wk.setIdx>=wk.sets[ex].length-1;
  const isLastEx=wk.exIdx>=exs.length-1;

  if(isLastSet&&isLastEx){
    // ALL DONE
    clearInterval(wk.elapsedTimer);
    showRecordSheet();
    celebrate();
    return;
  }

  // advance
  if(isLastSet){wk.exIdx++;wk.setIdx=0;}
  else{wk.setIdx++;}

  // start rest timer
  startRest();
}

function checkPR(exName,set){
  if(!set.weight||!set.reps)return;
  const prs=getPRs();
  const cur=prs[exName];
  const w=parseFloat(set.weight)||0;
  const r=parseInt(set.reps)||0;
  if(!cur||w>cur.weight||(w===cur.weight&&r>cur.reps)){
    prs[exName]={weight:w,reps:r,date:new Date().toISOString()};
    savePRs(prs);
    showToast(`🏆 ${exName} 신기록!`);
  }
}

function startRest(){
  const nextEx=wk.routine.exercises[wk.exIdx];
  const nextSet=wk.setIdx+1;
  document.getElementById('rest-next-hint').textContent=
    `다음: ${nextEx} ${nextSet}세트`;

  const total=restTime;
  wk.restTotal=total;
  wk.restRemain=total;

  const circ=2*Math.PI*88;
  const ring=document.getElementById('rest-ring');
  ring.style.strokeDasharray=circ;
  ring.style.strokeDashoffset=0;

  document.getElementById('rest-overlay').classList.add('show');
  updateRestUI();

  clearInterval(wk.restTimer);
  wk.restTimer=setInterval(()=>{
    wk.restRemain--;
    updateRestUI();
    if(wk.restRemain<=0){
      skipRest();
      haptic('heavy');
    }
  },1000);
}

function updateRestUI(){
  document.getElementById('rest-sec').textContent=wk.restRemain;
  const circ=2*Math.PI*88;
  const ratio=wk.restRemain/wk.restTotal;
  document.getElementById('rest-ring').style.strokeDashoffset=circ*(1-ratio);
}

function skipRest(){
  clearInterval(wk.restTimer);
  document.getElementById('rest-overlay').classList.remove('show');
  renderWorkout();
}

function addRest(sec){
  wk.restRemain+=sec;
  wk.restTotal+=sec;
  updateRestUI();
}

function exitWorkout(){
  if(!confirm('운동을 종료할까요? 진행 중인 기록이 저장되지 않을 수 있어요.'))return;
  clearInterval(wk.elapsedTimer);
  clearInterval(wk.restTimer);
  showScreen('home');
}

let mediaPlaying=true;
function setupMediaSession(){
  if(!('mediaSession' in navigator))return;
  navigator.mediaSession.setActionHandler('play',()=>{mediaPlaying=true;updateMediaUI();});
  navigator.mediaSession.setActionHandler('pause',()=>{mediaPlaying=false;updateMediaUI();});
  navigator.mediaSession.setActionHandler('previoustrack',mediaPrev);
  navigator.mediaSession.setActionHandler('nexttrack',mediaNext);
  updateMediaUI();
}
function mediaToggle(){
  mediaPlaying=!mediaPlaying;
  // Try to control actual audio context
  try{
    if(mediaPlaying)navigator.mediaSession.playbackState='playing';
    else navigator.mediaSession.playbackState='paused';
  }catch(e){}
  updateMediaUI();
}
function mediaPrev(){try{navigator.mediaSession.seekTo&&navigator.mediaSession.seekTo({seekTime:0});}catch(e){}haptic();}
function mediaNext(){haptic();}
function updateMediaUI(){
  const icon=document.getElementById('media-play-icon');
  if(!icon)return;
  icon.innerHTML=mediaPlaying
    ?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    :'<path d="M8 5v14l11-7z"/>';
}

// HISTORY & CALENDAR
// ══════════════════════════════════════
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth(), calSel=null;
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function changeMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  calSel=null;renderHistory();
}

function renderHistory(){
  const body=document.getElementById('history-body');
  const hist=getHist();
  const now=new Date();
  document.getElementById('cal-label').textContent=`${calYear}년 ${MONTHS[calMonth]}`;

  // date map
  const dm={};
  hist.forEach(r=>{
    const d=new Date(r.date);
    if(d.getFullYear()===calYear&&d.getMonth()===calMonth){
      const k=d.getDate();
      if(!dm[k])dm[k]=[];
      dm[k].push(r);
    }
  });

  // stats row
  const monthHist=hist.filter(r=>{const d=new Date(r.date);return d.getMonth()===calMonth&&d.getFullYear()===calYear;});
  const totalVol=monthHist.reduce((a,r)=>a+Object.values(r.exercises||{}).reduce((b,sets)=>b+sets.reduce((c,s)=>c+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),0),0);
  const streak=getStreak();

  let h=`<div class="stat-row">
    <div class="stat-card"><div class="stat-label">이번 달 운동</div><div class="stat-val">${monthHist.length}</div><div class="stat-sub">회</div></div>
    <div class="stat-card"><div class="stat-label">연속 출석</div><div class="stat-val">${streak}</div><div class="stat-sub">일 🔥</div></div>
  </div>`;

  // volume chart (last 7 days)
  h+=renderVolumeChart(hist);

  // calendar
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayD=(now.getFullYear()===calYear&&now.getMonth()===calMonth)?now.getDate():null;

  h+=`<div class="cal-grid">`;
  DAYS.forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<firstDay;i++)h+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const hasR=!!dm[d], isT=d===todayD, isSel=d===calSel;
    h+=`<div class="cal-day ${hasR?'has-r':''} ${isT?'today':''} ${isSel?'sel':''}" onclick="selectDate(${d})">
      <span class="cal-day-n">${d}</span>${hasR?`<span class="cal-dot"></span>`:''}
    </div>`;
  }
  h+='</div>';

  // selected detail
  if(calSel&&dm[calSel]){
    dm[calSel].forEach(r=>{ h+=renderRecCard(r); });
  } else if(calSel){
    h+=`<div class="no-rec">이 날은 운동 기록이 없어요</div>`;
  }

  // monthly report button
  h+=`<button class="report-btn" onclick="showMonthlyReport()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    ${calYear}년 ${MONTHS[calMonth]} 월간 리포트
  </button>`;

  body.innerHTML=h;
}

function renderVolumeChart(hist){
  const days=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d);}
  const vols=days.map(d=>{
    const ds=d.toISOString().slice(0,10);
    const recs=hist.filter(r=>r.date.slice(0,10)===ds);
    return recs.reduce((a,r)=>a+Object.values(r.exercises||{}).reduce((b,sets)=>b+sets.reduce((c,s)=>c+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),0),0);
  });
  const maxV=Math.max(...vols,1);
  const bars=days.map((d,i)=>{
    const h=Math.round(vols[i]/maxV*100);
    const isToday=i===6;
    return `<div class="vol-bar-col">
      <div class="vol-bar ${isToday?'this':''}" style="height:${Math.max(h,4)}%"></div>
      <div class="vol-bar-label">${DAYS[d.getDay()]}</div>
    </div>`;
  }).join('');
  return `<div class="vol-chart-wrap"><div class="vol-chart-title">주간 볼륨 (kg)</div><div class="vol-bars">${bars}</div></div>`;
}

function renderRecCard(r){
  const d=new Date(r.date);
  const ds=d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
  const ts=d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  const dur=r.duration?`${Math.floor(r.duration/60)}분 ${r.duration%60}초`:'';
  const prs=getPRs();
  let exH='';
  Object.entries(r.exercises||{}).forEach(([exName,sets])=>{
    const isPR=prs[exName]&&sets.some(s=>parseFloat(s.weight)>=prs[exName].weight);
    exH+=`<div class="rec-ex-block"><div class="rec-ex-name">${exName}${isPR?`<span class="rec-pr-tag">🏆 PR</span>`:''}</div>`;
    sets.forEach((s,i)=>{
      let t=`${i+1}세트`;
      if(s.weight)t+=` ${s.weight}kg`;
      if(s.reps)t+=` × ${s.reps}회`;
      exH+=`<div class="rec-set-row"><span class="rec-set-n">${i+1}세트</span><span>${s.weight?s.weight+'kg':''} ${s.reps?'× '+s.reps+'회':''}</span></div>`;
    });
    exH+='</div>';
  });
  return `<div class="rec-card">
    <div class="rec-date">${ds} ${ts}</div>
    <div class="rec-session">${r.sessionName}</div>
    ${dur?`<div class="rec-duration">⏱ ${dur}</div>`:''}
    ${r.photo?`<img class="rec-photo" src="${r.photo}" alt="">`:''}
    ${r.note?`<div class="rec-note">${r.note}</div>`:''}
    ${exH}
    <div class="rec-actions">
      <button class="rec-act-btn" onclick="shareRecord(${r.id})">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>공유
      </button>
      <button class="rec-act-btn" onclick="exportICS(${r.id})">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>캘린더
      </button>
      <button class="rec-del" onclick="deleteRecord(${r.id})">삭제</button>
    </div>
  </div>`;
}

function selectDate(d){
  calSel=(calSel===d)?null:d;
  renderHistory();
  if(calSel)setTimeout(()=>{const el=document.querySelector('.rec-card');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},60);
}

function showMonthlyReport(){
  const hist=getHist();
  const mHist=hist.filter(r=>{const d=new Date(r.date);return d.getMonth()===calMonth&&d.getFullYear()===calYear;});
  if(!mHist.length){showToast('이 달 기록이 없어요');return;}

  const totalDays=mHist.length;
  const totalVol=mHist.reduce((a,r)=>a+Object.values(r.exercises||{}).reduce((b,sets)=>b+sets.reduce((c,s)=>c+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),0),0);
  const exCount={};
  mHist.forEach(r=>Object.keys(r.exercises||{}).forEach(ex=>{exCount[ex]=(exCount[ex]||0)+1;}));
  const topEx=Object.entries(exCount).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>`${k}(${v}회)`).join(', ');

  const text=`📊 ${calYear}년 ${MONTHS[calMonth]} 운동 리포트\n\n운동 일수: ${totalDays}일\n총 볼륨: ${Math.round(totalVol).toLocaleString()}kg\n많이 한 운동: ${topEx||'없음'}`;

  if(navigator.share){navigator.share({title:'월간 운동 리포트',text});}
  else{navigator.clipboard&&navigator.clipboard.writeText(text);showToast('리포트가 복사됐어요');}
}

let pendingPhoto=null;

function showRecordSheet(){
  // build summary from wk.sets
  const r=wk.routine;
  let h=`<div class="sum-lbl">${r.name} · ${state.week}주차 ${DAYS_F[state.activeDay]}</div>`;
  r.exercises.forEach(ex=>{
    const sets=(wk.sets[ex]||[]).filter(s=>s.done);if(!sets.length)return;
    const strs=sets.map((s,i)=>{let t=`${i+1}세트`;if(s.weight)t+=` ${s.weight}kg`;if(s.reps)t+=` × ${s.reps}회`;return t;}).join(' · ');
    h+=`<div class="sum-ex-row"><div class="sum-ex-name">${ex}</div><div class="sum-ex-sets">${strs}</div></div>`;
  });
  document.getElementById('modal-summary').innerHTML=h;
  document.getElementById('note-input').value='';
  document.getElementById('photo-prev').classList.remove('show');
  document.getElementById('photo-label').textContent='사진 첨부 (선택)';
  pendingPhoto=null;
  document.getElementById('record-sheet').classList.add('open');
}

document.getElementById('photo-input').addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    pendingPhoto=e.target.result;
    const p=document.getElementById('photo-prev');
    p.src=pendingPhoto;p.classList.add('show');
    document.getElementById('photo-label').textContent='사진 변경';
  };
  reader.readAsDataURL(f);
});

function saveRecord(){
  const r=wk.routine||getR();if(!r)return;
  const exercises={};
  r.exercises.forEach(ex=>{
    const sets=(wk.sets[ex]||[]).filter(s=>s.done);
    if(sets.length)exercises[ex]=sets;
  });
  const record={
    id:Date.now(),date:new Date().toISOString(),
    week:state.week,day:state.activeDay,
    sessionName:r.name,exercises,
    duration:wk.elapsed||0,
    note:document.getElementById('note-input').value.trim(),
    photo:pendingPhoto||null,
  };
  const h=getHist();h.unshift(record);saveHist(h);
  closeSheet('record-sheet');
  clearInterval(wk.elapsedTimer);
  clearInterval(wk.restTimer);
  wk={routine:null,exIdx:0,setIdx:0,sets:{},elapsed:0,elapsedTimer:null,restTimer:null,restRemain:0,restTotal:0};
  showToast('저장 완료! 💪');
  setTimeout(()=>{showScreen('history');},700);
}

function shareRecord(id){
  const r=getHist().find(x=>x.id===id);if(!r)return;
  const t=THEMES.find(x=>x.id===currentTheme)||THEMES[0];
  const canvas=document.getElementById('share-canvas');
  canvas.width=1080;canvas.height=1080;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle=t.bg;ctx.fillRect(0,0,1080,1080);
  ctx.fillStyle=t.acc;ctx.fillRect(0,0,1080,8);
  ctx.fillStyle=t.acc;ctx.font='bold 52px Arial';ctx.fillText('WORKOUT DONE',60,100);
  const d=new Date(r.date);
  ctx.fillStyle='#888';ctx.font='28px Arial';ctx.fillText(d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'}),60,148);
  ctx.fillStyle=currentTheme==='white'?'#111':'#f0f0f0';ctx.font='bold 64px Arial';ctx.fillText(r.sessionName,60,240);
  ctx.strokeStyle=t.acc;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(60,270);ctx.lineTo(1020,270);ctx.stroke();
  let y=330;
  Object.entries(r.exercises||{}).forEach(([ex,sets])=>{
    ctx.fillStyle=currentTheme==='white'?'#111':'#f0f0f0';ctx.font='32px Arial';ctx.fillText('• '+ex,60,y);y+=44;
    const strs=sets.map((s,i)=>{let t2=`${i+1}세트`;if(s.weight)t2+=` ${s.weight}kg`;if(s.reps)t2+=`×${s.reps}회`;return t2;}).join('  ');
    ctx.fillStyle='#888';ctx.font='26px Arial';ctx.fillText(strs,80,y);y+=40;ctx.font='32px Arial';
    if(y>900)return;
  });
  ctx.fillStyle=t.acc;ctx.fillRect(0,1072,1080,8);
  canvas.toBlob(blob=>{
    if(navigator.share&&blob){
      const file=new File([blob],'workout.png',{type:'image/png'});
      navigator.share({files:[file],title:'오늘 운동 완료!',text:`${r.sessionName} 완료 💪`}).catch(()=>dlCanvas(canvas));
    }else dlCanvas(canvas);
  },'image/png');
}
function dlCanvas(c){const a=document.createElement('a');a.download='workout.png';a.href=c.toDataURL('image/png');a.click();showToast('이미지 저장 완료 📸');}

function exportICS(id){
  const r=getHist().find(x=>x.id===id);if(!r)return;
  const d=new Date(r.date);
  const dateStr=[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('');
  let desc=`운동: ${r.sessionName}\\n`;
  Object.entries(r.exercises||{}).forEach(([ex,sets])=>{
    const strs=sets.map((s,i)=>`${i+1}세트 ${s.weight||'?'}kg×${s.reps||'?'}회`).join(', ');
    desc+=`${ex}: ${strs}\\n`;
  });
  if(r.note)desc+=`\\n메모: ${r.note}`;
  const ics=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//WorkoutApp//KO\r\nBEGIN:VEVENT\r\nUID:${r.id}@workoutapp\r\nDTSTAMP:${new Date().toISOString().replace(/[-:]/g,'').slice(0,15)}Z\r\nDTSTART;VALUE=DATE:${dateStr}\r\nDTEND;VALUE=DATE:${dateStr}\r\nSUMMARY:💪 ${r.sessionName}\r\nDESCRIPTION:${desc}\r\nEND:VEVENT\r\nEND:VCALENDAR`;
  const blob=new Blob([ics],{type:'text/calendar'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`workout-${dateStr}.ics`;a.click();
  showToast('캘린더 파일 저장 완료 📅');
}

function deleteRecord(id){
  if(!confirm('이 기록을 삭제할까요?'))return;
  saveHist(getHist().filter(x=>x.id!==id));calSel=null;renderHistory();showToast('삭제했어요');
}

// ══════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════
function renderSettings(){
  const hist=getHist();
  const totalW=hist.length;
  const prs=getPRs();
  const prCount=Object.keys(prs).length;
  const cards=THEMES.map(t=>`
    <div class="theme-card ${currentTheme===t.id?'on':''}" onclick="setTheme('${t.id}')">
      <div class="theme-check">✓</div>
      <div class="theme-preview">${t.p.map(c=>`<div class="tp" style="background:${c};${c.startsWith('#f')?'border:1px solid #ccc':''}"></div>`).join('')}</div>
      <div class="theme-name">${t.name}</div>
    </div>`).join('');

  const restOpts=[60,120,300].map(s=>`
    <button class="rest-opt ${restTime===s?'on':''}" onclick="setRestTime(${s})">${s===60?'1분':s===120?'2분':'5분'}</button>`).join('');

  document.getElementById('settings-body').innerHTML=`
    <div class="settings-sec"><div class="settings-sec-title">테마</div><div class="theme-grid">${cards}</div></div>
    <div class="settings-sec">
      <div class="settings-sec-title">기본 휴식 시간</div>
      <div class="rest-options">${restOpts}</div>
    </div>
    <div class="settings-sec">
      <div class="settings-sec-title">통계</div>
      <div class="set-row"><div><div class="set-row-label">총 운동 횟수</div></div><div class="set-row-right">${totalW}회</div></div>
      <div class="set-row"><div><div class="set-row-label">개인 기록 (PR)</div></div><div class="set-row-right">${prCount}종목</div></div>
      <div class="set-row"><div><div class="set-row-label">연속 출석</div></div><div class="set-row-right">${getStreak()}일 🔥</div></div>
    </div>
    <div class="settings-sec">
      <div class="settings-sec-title">데이터</div>
      <div class="set-row" onclick="exportAll()" style="cursor:pointer;"><div><div class="set-row-label">전체 기록 백업</div><div class="set-row-sub">JSON 파일로 내보내기</div></div><div class="set-row-right">›</div></div>
      <div class="set-row" onclick="importAll()" style="cursor:pointer;"><div><div class="set-row-label">기록 복원</div><div class="set-row-sub">백업 파일에서 불러오기</div></div><div class="set-row-right">›</div></div>
    </div>`;
}

function setTheme(id){applyTheme(id);renderSettings();}
function setRestTime(s){restTime=s;localStorage.setItem('restTime',s);renderSettings();}

function exportAll(){
  const data={routines,history:getHist(),prs:getPRs(),exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`workout-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  showToast('백업 저장 완료');
}
function importAll(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.routines)routines=data.routines;
        if(data.history)saveHist(data.history);
        if(data.prs)savePRs(data.prs);
        saveR();renderSettings();showToast('복원 완료 ✓');
      }catch(e){showToast('파일을 읽을 수 없어요');}
    };
    reader.readAsText(f);
  };
  input.click();
}

// ══════════════════════════════════════
// CELEBRATION
// ══════════════════════════════════════
function celebrate(){
  const el=document.getElementById('celebrate');
  el.innerHTML='';el.classList.add('show');
  const colors=['#C8FF00','#FF3030','#D4AF37','#fff','#0af'];
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.5}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
    el.appendChild(c);
  }
  setTimeout(()=>{el.classList.remove('show');el.innerHTML='';},4000);
}

// ══════════════════════════════════════
// UTILS
// ══════════════════════════════════════
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function haptic(type='light'){try{if(window.navigator.vibrate){window.navigator.vibrate(type==='heavy'?[30,10,30]:type==='medium'?20:10);}}catch(e){}}
['record-sheet','edit-sheet'].forEach(id=>{document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeSheet(id);});});

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
applyTheme(currentTheme);
loadData();
renderHome();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
