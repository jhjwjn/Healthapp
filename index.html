<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="운동루틴">
<meta name="theme-color" id="theme-color-meta" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>우리 운동 루틴</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ══ THEME VARIABLES ══ */
:root {
  --bg:#0a0a0a; --surface:#141414; --surface2:#1e1e1e; --border:#2a2a2a;
  --accent:#C8FF00; --accent-rgb:200,255,0; --accent-dim:rgba(200,255,0,0.12); --accent-border:rgba(200,255,0,0.3);
  --text:#f0f0f0; --text2:#888; --text3:#555; --red:#ff4444;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
body.theme-red {
  --bg:#0a0000; --surface:#170000; --surface2:#220000; --border:#3a1010;
  --accent:#FF2D2D; --accent-rgb:255,45,45; --accent-dim:rgba(255,45,45,0.12); --accent-border:rgba(255,45,45,0.35);
  --text:#f5f0f0; --text2:#996666; --text3:#663333;
}
body.theme-navy {
  --bg:#06080f; --surface:#0e1220; --surface2:#161d30; --border:#222c44;
  --accent:#D4AF37; --accent-rgb:212,175,55; --accent-dim:rgba(212,175,55,0.12); --accent-border:rgba(212,175,55,0.35);
  --text:#e8eaf0; --text2:#6677aa; --text3:#334466;
}
body.theme-white {
  --bg:#f5f5f3; --surface:#ffffff; --surface2:#eeeeec; --border:#ddddd8;
  --accent:#111111; --accent-rgb:17,17,17; --accent-dim:rgba(17,17,17,0.07); --accent-border:rgba(17,17,17,0.2);
  --text:#111111; --text2:#777770; --text3:#aaaaaa; --red:#dd2222;
}

/* ══ BASE ══ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden;transition:background .3s,color .3s;}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--accent);}
.topbar-sub{font-size:12px;color:var(--text2);margin-top:1px;}
.pill-btn{height:32px;padding:0 12px;border-radius:20px;border:1px solid var(--accent-border);background:var(--accent-dim);color:var(--accent);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.outline-btn{height:32px;padding:0 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}

/* scroll */
.scroll-body{flex:1;overflow-y:auto;padding:16px 20px;padding-bottom:calc(88px + var(--safe-bottom));}
.scroll-body::-webkit-scrollbar{display:none;}

/* week toggle */
.week-toggle{display:flex;gap:8px;margin-bottom:20px;}
.week-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;}
.week-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:500;}

/* day tabs */
.day-tabs{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;}
.day-tab .dl{font-size:13px;font-weight:500;color:var(--text2);}
.day-tab .dd{width:5px;height:5px;border-radius:50%;background:transparent;}
.day-tab.hw .dd{background:var(--text3);}
.day-tab.active{border-color:var(--accent);background:var(--accent-dim);}
.day-tab.active .dl{color:var(--accent);}
.day-tab.active .dd{background:var(--accent);}

/* session header */
.session-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:16px;}
.session-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;}
.session-tag{display:inline-block;margin-top:4px;padding:3px 10px;border-radius:20px;background:var(--accent-dim);border:1px solid var(--accent-border);font-size:11px;color:var(--accent);}

/* progress */
.progress-wrap{margin-bottom:20px;}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px;}
.progress-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}

/* exercise cards */
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;transition:border-color .2s;}
.ex-card.done{border-color:var(--accent-border);}
.ex-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
.ex-chk{width:24px;height:24px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--text3);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;}
.ex-chk.checked{background:var(--accent);border-color:var(--accent);}
.ex-chk svg{display:none;}
.ex-chk.checked svg{display:block;}
.ex-name{flex:1;font-size:15px;font-weight:500;}
.ex-sum{font-size:12px;color:var(--text2);}
.ex-arr{font-size:18px;color:var(--text3);transition:transform .2s;}
.ex-card.expanded .ex-arr{transform:rotate(180deg);}
.ex-detail{border-top:1px solid var(--border);padding:14px 16px;display:none;}
.ex-card.expanded .ex-detail{display:block;}

/* set rows */
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.set-num{font-size:12px;color:var(--text3);width:30px;flex-shrink:0;}
.set-grp{display:flex;align-items:center;gap:6px;flex:1;}
.set-field{display:flex;flex-direction:column;gap:3px;flex:1;}
.set-field label{font-size:10px;color:var(--text3);}
.set-field input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;width:100%;outline:none;transition:border-color .15s;}
.set-field input:focus{border-color:var(--accent);}
.set-chk{width:32px;height:32px;border-radius:8px;flex-shrink:0;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:16px;}
.set-chk.done{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.add-set-btn{width:100%;padding:8px;border-radius:8px;margin-top:4px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* rest day */
.rest-day{text-align:center;padding:40px 0 20px;color:var(--text3);}
.rest-icon{font-size:48px;margin-bottom:12px;}
.rest-day p{font-size:15px;margin-bottom:20px;}

/* quick record link on today */
.quick-record-btn{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:20px;cursor:pointer;text-decoration:none;}
.quick-record-btn:active{border-color:var(--accent);}
.qrb-left{display:flex;align-items:center;gap:10px;}
.qrb-dot-wrap{display:flex;gap:4px;}
.qrb-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0.4;}
.qrb-dot.filled{opacity:1;}
.qrb-label{font-size:13px;color:var(--text2);}
.qrb-arrow{font-size:16px;color:var(--text3);}

/* finish btn */
.finish-wrap{position:fixed;bottom:0;left:0;right:0;padding:12px 20px;padding-bottom:calc(12px + var(--safe-bottom));background:linear-gradient(to top,var(--bg) 55%,transparent);}
.finish-btn{width:100%;padding:16px;border-radius:14px;background:var(--accent);border:none;color:var(--bg);font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .15s;}
.finish-btn:disabled{opacity:.3;}
.finish-btn:active{opacity:.8;}

/* ══ CALENDAR ══ */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-month{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px;}
.cal-dow{text-align:center;font-size:11px;color:var(--text3);padding:6px 0;}
.cal-day{position:relative;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.cal-day:active{background:var(--surface2);}
.cal-day.empty{cursor:default;}
.cal-day.today{border-color:var(--accent-border);}
.cal-day.has-record{background:var(--accent-dim);}
.cal-day.selected{background:var(--accent);border-color:var(--accent);}
.cal-day-num{font-size:13px;font-weight:500;color:var(--text2);}
.cal-day.today .cal-day-num{color:var(--accent);}
.cal-day.has-record .cal-day-num{color:var(--text);}
.cal-day.selected .cal-day-num{color:var(--bg);font-weight:700;}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);margin-top:2px;}
.cal-day.selected .cal-dot{background:var(--bg);}

/* record detail */
.rec-detail{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
.rec-detail-date{font-size:12px;color:var(--accent);font-weight:500;margin-bottom:6px;}
.rec-detail-session{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:12px;}
.rec-photo{width:100%;border-radius:10px;margin-bottom:12px;object-fit:cover;max-height:240px;display:block;}
.rec-note{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap;padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:12px;}
.rec-ex-block{margin-bottom:6px;}
.rec-ex-name{font-size:14px;font-weight:500;margin-bottom:4px;}
.rec-set-row{font-size:12px;color:var(--text2);padding:3px 0;display:flex;gap:8px;}
.rec-set-num{color:var(--text3);width:32px;}
.rec-actions{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.rec-action-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.rec-action-btn:active{border-color:var(--accent);color:var(--accent);}
.rec-del-btn{padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.rec-del-btn:active{border-color:var(--red);color:var(--red);}
.no-record{text-align:center;padding:32px 0;color:var(--text3);font-size:14px;}

/* ══ SETTINGS ══ */
.settings-section{margin-bottom:28px;}
.settings-title{font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.theme-card{padding:16px;border-radius:14px;border:1.5px solid var(--border);cursor:pointer;transition:all .2s;position:relative;}
.theme-card.active-theme{border-color:var(--accent);}
.theme-preview{display:flex;gap:5px;margin-bottom:10px;}
.tp-circle{width:20px;height:20px;border-radius:50%;}
.theme-name{font-size:13px;font-weight:500;}
.theme-check{position:absolute;top:10px;right:10px;width:18px;height:18px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;font-size:10px;color:var(--bg);}
.theme-card.active-theme .theme-check{display:flex;}

.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-row-label{font-size:14px;}
.settings-row-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.settings-row-right{font-size:13px;color:var(--accent);}

/* ══ BOTTOM NAV ══ */
.bottom-nav{display:flex;border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);flex-shrink:0;background:var(--bg);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;transition:color .15s;}
.nav-btn svg{width:22px;height:22px;}
.nav-btn.active{color:var(--accent);}

/* ══ MODALS ══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:16px auto 0;flex-shrink:0;}
.modal-hdr{padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px;}
.modal-body::-webkit-scrollbar{display:none;}
.modal-ftr{padding:12px 20px;padding-bottom:calc(12px + var(--safe-bottom));border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:10px;background:var(--surface);}
.m-cancel{flex:1;padding:14px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.m-save{flex:2;padding:14px;border-radius:12px;border:none;background:var(--accent);color:var(--bg);font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* record modal */
.sum-block{background:var(--surface2);border-radius:12px;padding:14px;margin-bottom:16px;}
.sum-label{font-size:11px;color:var(--text3);letter-spacing:.08em;margin-bottom:10px;text-transform:uppercase;}
.sum-ex-row{margin-bottom:8px;}
.sum-ex-name{font-size:14px;font-weight:500;margin-bottom:2px;}
.sum-ex-sets{font-size:12px;color:var(--text2);}
.photo-area{border:1.5px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;margin-bottom:16px;display:block;transition:border-color .15s;}
.photo-area p{font-size:13px;color:var(--text3);margin-top:6px;}
.photo-prev{width:100%;border-radius:10px;margin-bottom:16px;display:none;}
.photo-prev.visible{display:block;}
.note-area{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;resize:none;outline:none;line-height:1.6;margin-bottom:8px;}
.note-area:focus{border-color:var(--accent);}

/* edit modal */
.edit-sec{margin-bottom:24px;}
.edit-sec-title{font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.edit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.edit-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;}
.edit-input:focus{border-color:var(--accent);}
.del-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.del-btn:active{border-color:var(--red);color:var(--red);}
.edit-add-btn{width:100%;padding:10px;border-radius:10px;margin-top:4px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.name-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:15px;font-weight:500;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;margin-bottom:6px;}
.name-input:focus{border-color:var(--accent);}
.danger-btn{width:100%;padding:12px;border-radius:10px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* share card canvas (hidden) */
#share-canvas{display:none;}

/* toast */
.toast{position:fixed;bottom:calc(88px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);padding:10px 20px;border-radius:20px;font-size:13px;color:var(--text);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">

  <!-- ══ TODAY ══ -->
  <div class="screen active" id="screen-today">
    <div class="topbar">
      <div>
        <div class="topbar-title">WORKOUT</div>
        <div class="topbar-sub" id="today-date"></div>
      </div>
      <button class="pill-btn" id="week-ind">1주차</button>
    </div>
    <div class="scroll-body" id="today-body"></div>
    <div class="finish-wrap">
      <button class="finish-btn" id="finish-btn" disabled>운동 완료 기록하기</button>
    </div>
  </div>

  <!-- ══ HISTORY ══ -->
  <div class="screen" id="screen-history">
    <div class="topbar">
      <div><div class="topbar-title">RECORDS</div><div class="topbar-sub" id="cal-month-label"></div></div>
      <div style="display:flex;gap:8px;">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="scroll-body" id="history-body"></div>
  </div>

  <!-- ══ SETTINGS ══ -->
  <div class="screen" id="screen-settings">
    <div class="topbar">
      <div><div class="topbar-title">SETTINGS</div><div class="topbar-sub">설정</div></div>
    </div>
    <div class="scroll-body" id="settings-body"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="showScreen('today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
      </svg>오늘
    </button>
    <button class="nav-btn" id="nav-history" onclick="showScreen('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/>
      </svg>기록
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showScreen('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="12" cy="12" r="3"/>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// THEMES
// ══════════════════════════════════════════
const THEMES = [
  { id:'dark',  name:'다크 라임',  classes:'',           bg:'#0a0a0a', acc:'#C8FF00', preview:['#0a0a0a','#141414','#C8FF00'] },
  { id:'red',   name:'블랙 레드',  classes:'theme-red',  bg:'#0a0000', acc:'#FF2D2D', preview:['#0a0000','#170000','#FF2D2D'] },
  { id:'navy',  name:'네이비 골드',classes:'theme-navy', bg:'#06080f', acc:'#D4AF37', preview:['#06080f','#0e1220','#D4AF37'] },
  { id:'white', name:'화이트',     classes:'theme-white',bg:'#f5f5f3', acc:'#111111', preview:['#f5f5f3','#ffffff','#111111'] },
];
let currentTheme = localStorage.getItem('theme') || 'dark';
function applyTheme(id) {
  currentTheme = id;
  const t = THEMES.find(x=>x.id===id) || THEMES[0];
  document.body.className = t.classes;
  document.getElementById('theme-color-meta').content = t.bg;
  localStorage.setItem('theme', id);
}

// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
const DEFAULT_ROUTINES = {
  '1-1':{name:'가슴 너비',exercises:['펙덱 플라이','케이블 플라이','덤벨 프레스','인클라인 벤치프레스']},
  '1-3':{name:'등 너비',exercises:['랫풀다운 (중립)','랫풀다운 (와이드)','암풀다운','덤벨로우']},
  '1-5':{name:'하체',exercises:['스쿼트','레그 익스텐션','런지']},
  '1-0':{name:'어깨',exercises:['사이드 레터럴 레이즈','페이스 폴','밀리터리 프레스']},
  '2-1':{name:'가슴 두께',exercises:['인클라인 벤치 프레스','인클라인 덤벨 프레스','펙덱 플라이']},
  '2-3':{name:'등 두께',exercises:['바벨로우','T바로우','덤벨로우','랫풀다운']},
  '2-5':{name:'하체',exercises:['스쿼트','레그 익스텐션','런지']},
  '2-0':{name:'어깨',exercises:['사이드 레터럴 레이즈','페이스 폴','밀리터리 프레스']},
};
const DAYS=['일','월','화','수','목','금','토'];
const DAYS_FULL=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

let routines={}, state={week:1,activeDay:new Date().getDay(),sets:{}};
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();
let selectedDate=null;

function loadData(){
  try{const r=localStorage.getItem('rt_v3');routines=r?JSON.parse(r):JSON.parse(JSON.stringify(DEFAULT_ROUTINES));}
  catch(e){routines=JSON.parse(JSON.stringify(DEFAULT_ROUTINES));}
  try{const s=localStorage.getItem('st_v3');if(s)Object.assign(state,JSON.parse(s));}catch(e){}
}
function saveR(){try{localStorage.setItem('rt_v3',JSON.stringify(routines));}catch(e){}}
function saveS(){try{localStorage.setItem('st_v3',JSON.stringify(state));}catch(e){}}
function getHist(){try{return JSON.parse(localStorage.getItem('hist_v3')||'[]');}catch(e){return[];}}
function saveHist(h){try{localStorage.setItem('hist_v3',JSON.stringify(h));}catch(e){}}

function rKey(){return state.week+'-'+state.activeDay;}
function getR(){return routines[rKey()]||null;}
function sKey(ex){return rKey()+'-'+ex;}
function ensureSets(ex){const k=sKey(ex);if(!state.sets[k])state.sets[k]=[{reps:'',weight:'',done:false}];return state.sets[k];}

// ══════════════════════════════════════════
// SCREENS
// ══════════════════════════════════════════
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='history'){selectedDate=null;renderCalendar();}
  if(name==='settings')renderSettings();
}

// ══════════════════════════════════════════
// TODAY
// ══════════════════════════════════════════
function renderToday(){
  const body=document.getElementById('today-body');
  const routine=getR();
  const now=new Date();
  document.getElementById('today-date').textContent=now.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'});
  document.getElementById('week-ind').textContent=state.week+'주차';

  let h='';

  // quick record shortcut
  const hist=getHist();
  const recentCount=hist.filter(r=>{
    const d=new Date(r.date);
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  }).length;
  const dots=Array.from({length:Math.min(recentCount,5)},(_,i)=>`<div class="qrb-dot filled"></div>`).join('')+
    Array.from({length:Math.max(0,5-recentCount)},()=>`<div class="qrb-dot"></div>`).join('');
  h+=`<div class="quick-record-btn" onclick="showScreen('history')">
    <div class="qrb-left">
      <div class="qrb-dot-wrap">${dots}</div>
      <span class="qrb-label">이번 달 ${recentCount}회 운동</span>
    </div>
    <span class="qrb-arrow">›</span>
  </div>`;

  // week toggle
  h+=`<div class="week-toggle">
    <button class="week-btn ${state.week===1?'active':''}" onclick="setWeek(1)">1주차</button>
    <button class="week-btn ${state.week===2?'active':''}" onclick="setWeek(2)">2주차</button>
  </div>`;

  // day tabs
  h+='<div class="day-tabs">';
  DAYS.forEach((d,i)=>{
    const hw=!!routines[state.week+'-'+i];
    h+=`<button class="day-tab ${hw?'hw':''} ${i===state.activeDay?'active':''}" onclick="setDay(${i})">
      <span class="dl">${d}</span><span class="dd"></span></button>`;
  });
  h+='</div>';

  if(!routine){
    h+=`<div class="rest-day"><div class="rest-icon">🛌</div>
      <p>등록된 루틴이 없어요</p>
      <button class="outline-btn" style="margin:0 auto;" onclick="openEditModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>이 날 루틴 추가</button></div>`;
    document.getElementById('finish-btn').disabled=true;
    body.innerHTML=h; return;
  }

  h+=`<div class="session-header">
    <div>
      <div class="session-name">${routine.name}</div>
      <span class="session-tag">${DAYS_FULL[state.activeDay]} · ${state.week}주차</span>
    </div>
    <button class="outline-btn" onclick="openEditModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>편집</button>
  </div>`;

  const exs=routine.exercises;
  const doneC=exs.filter(ex=>{const s=state.sets[sKey(ex)]||[];return s.length>0&&s.every(s=>s.done);}).length;
  const pct=exs.length>0?Math.round(doneC/exs.length*100):0;
  h+=`<div class="progress-wrap">
    <div class="progress-info"><span>${doneC}/${exs.length} 종목 완료</span><span>${pct}%</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;

  exs.forEach((ex,ei)=>{
    const sets=ensureSets(ex);
    const allDone=sets.length>0&&sets.every(s=>s.done);
    const doneSets=sets.filter(s=>s.done).length;
    const sum=doneSets>0?`${doneSets}세트 완료`:`${sets.length}세트 예정`;
    const safe=ex.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    h+=`<div class="ex-card ${allDone?'done':''}" id="ec${ei}">
      <div class="ex-header" onclick="toggleExpand(${ei})">
        <div class="ex-chk ${allDone?'checked':''}" onclick="event.stopPropagation();toggleExChk('${safe}')">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <polyline points="2,6 5,9 10,3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="ex-name">${ex}</div>
        <div class="ex-sum">${sum}</div>
        <div class="ex-arr">⌄</div>
      </div>
      <div class="ex-detail">`;
    sets.forEach((set,si)=>{
      h+=`<div class="set-row"><div class="set-num">${si+1}세트</div>
        <div class="set-grp">
          <div class="set-field"><label>중량 (kg)</label>
            <input type="number" inputmode="decimal" placeholder="0" value="${set.weight}" onchange="updSet('${safe}',${si},'weight',this.value)"></div>
          <div class="set-field"><label>횟수</label>
            <input type="number" inputmode="numeric" placeholder="0" value="${set.reps}" onchange="updSet('${safe}',${si},'reps',this.value)"></div>
          <button class="set-chk ${set.done?'done':''}" onclick="togSetDone('${safe}',${si})">${set.done?'✓':'○'}</button>
        </div></div>`;
    });
    h+=`<button class="add-set-btn" onclick="addSet('${safe}')">+ 세트 추가</button></div></div>`;
  });

  body.innerHTML=h;
  if(window._exp)window._exp.forEach(ei=>{const c=document.getElementById('ec'+ei);if(c)c.classList.add('expanded');});
  document.getElementById('finish-btn').disabled=!exs.some(ex=>(state.sets[sKey(ex)]||[]).some(s=>s.done));
}

function toggleExpand(ei){
  const c=document.getElementById('ec'+ei);c.classList.toggle('expanded');
  if(!window._exp)window._exp=new Set();
  c.classList.contains('expanded')?window._exp.add(ei):window._exp.delete(ei);
}
function toggleExChk(ex){const s=ensureSets(ex),all=s.every(x=>x.done);s.forEach(x=>x.done=!all);saveS();renderToday();}
function updSet(ex,si,f,v){const k=sKey(ex);if(state.sets[k]?.[si]){state.sets[k][si][f]=v;saveS();}}
function togSetDone(ex,si){const k=sKey(ex);if(state.sets[k]?.[si]){state.sets[k][si].done=!state.sets[k][si].done;saveS();renderToday();}}
function addSet(ex){const k=sKey(ex);if(!state.sets[k])state.sets[k]=[];const l=state.sets[k][state.sets[k].length-1];state.sets[k].push({reps:l?.reps||'',weight:l?.weight||'',done:false});saveS();renderToday();}
function setWeek(w){state.week=w;window._exp=new Set();saveS();renderToday();}
function setDay(d){state.activeDay=d;window._exp=new Set();saveS();renderToday();}

// ══════════════════════════════════════════
// CALENDAR & HISTORY
// ══════════════════════════════════════════
function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  selectedDate=null;
  renderCalendar();
}

function renderCalendar(){
  const body=document.getElementById('history-body');
  const hist=getHist();
  const now=new Date();
  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('cal-month-label').textContent=`${calYear}년 ${monthNames[calMonth]}`;

  // build date→records map
  const dateMap={};
  hist.forEach(r=>{
    const d=new Date(r.date);
    if(d.getFullYear()===calYear&&d.getMonth()===calMonth){
      const key=d.getDate();
      if(!dateMap[key])dateMap[key]=[];
      dateMap[key].push(r);
    }
  });

  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayDate=(now.getFullYear()===calYear&&now.getMonth()===calMonth)?now.getDate():null;

  let h='<div class="cal-grid">';
  ['일','월','화','수','목','금','토'].forEach(d=>{h+=`<div class="cal-dow">${d}</div>`;});
  for(let i=0;i<firstDay;i++)h+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const hasRec=!!dateMap[d];
    const isToday=d===todayDate;
    const isSel=selectedDate===d;
    h+=`<div class="cal-day ${hasRec?'has-record':''} ${isToday?'today':''} ${isSel?'selected':''}" onclick="selectDate(${d})">
      <span class="cal-day-num">${d}</span>
      ${hasRec?`<span class="cal-dot"></span>`:''}
    </div>`;
  }
  h+='</div>';

  // selected day detail
  if(selectedDate&&dateMap[selectedDate]){
    dateMap[selectedDate].forEach(r=>{
      const dd=new Date(r.date);
      const ds=dd.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
      const ts=dd.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
      let exH='';
      Object.entries(r.exercises).forEach(([exName,sets])=>{
        exH+=`<div class="rec-ex-block"><div class="rec-ex-name">${exName}</div>`;
        sets.forEach((s,i)=>{
          let t=``;
          if(s.weight)t+=`${s.weight}kg`;
          if(s.weight&&s.reps)t+=' × ';
          if(s.reps)t+=`${s.reps}회`;
          exH+=`<div class="rec-set-row"><span class="rec-set-num">${i+1}세트</span><span>${t||'기록 없음'}</span></div>`;
        });
        exH+=`</div>`;
      });
      h+=`<div class="rec-detail">
        <div class="rec-detail-date">${ds} ${ts}</div>
        <div class="rec-detail-session">${r.sessionName}</div>
        ${r.photo?`<img class="rec-photo" src="${r.photo}" alt="운동 사진">`:''}
        ${r.note?`<div class="rec-note">${r.note}</div>`:''}
        ${exH}
        <div class="rec-actions">
          <button class="rec-action-btn" onclick="shareRecord(${r.id})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>공유
          </button>
          <button class="rec-action-btn" onclick="exportICS(${r.id})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>캘린더 저장
          </button>
          <button class="rec-del-btn" onclick="deleteRecord(${r.id})">삭제</button>
        </div>
      </div>`;
    });
  } else if(selectedDate&&!dateMap[selectedDate]){
    h+=`<div class="no-record">이 날은 운동 기록이 없어요</div>`;
  }

  body.innerHTML=h;
}

function selectDate(d){
  selectedDate=(selectedDate===d)?null:d;
  renderCalendar();
  if(selectedDate){
    setTimeout(()=>{
      const el=document.querySelector('.rec-detail');
      if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
    },50);
  }
}

// ══════════════════════════════════════════
// SHARE (인스타 공유 카드)
// ══════════════════════════════════════════
function shareRecord(id){
  const hist=getHist();
  const r=hist.find(x=>x.id===id);
  if(!r)return;
  const t=THEMES.find(x=>x.id===currentTheme)||THEMES[0];

  const canvas=document.getElementById('share-canvas');
  canvas.width=1080; canvas.height=1080;
  const ctx=canvas.getContext('2d');

  // background
  ctx.fillStyle=t.bg; ctx.fillRect(0,0,1080,1080);

  // accent bar top
  ctx.fillStyle=t.acc; ctx.fillRect(0,0,1080,8);

  // title
  ctx.fillStyle=t.acc;
  ctx.font='bold 52px Arial'; ctx.fillText('WORKOUT DONE', 60, 100);

  // date
  const d=new Date(r.date);
  const ds=d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  ctx.fillStyle=currentTheme==='white'?'#555':'#888';
  ctx.font='28px Arial'; ctx.fillText(ds, 60, 148);

  // session name
  ctx.fillStyle=currentTheme==='white'?'#111':'#f0f0f0';
  ctx.font='bold 64px Arial'; ctx.fillText(r.sessionName, 60, 240);

  // divider
  ctx.strokeStyle=t.acc; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(60,270); ctx.lineTo(1020,270); ctx.stroke();

  // exercises
  let y=330;
  ctx.font='32px Arial';
  Object.entries(r.exercises).forEach(([exName,sets])=>{
    ctx.fillStyle=currentTheme==='white'?'#111':'#f0f0f0';
    ctx.fillText(`• ${exName}`, 60, y); y+=44;
    const strs=sets.map((s,i)=>{
      let t2=`${i+1}세트`;
      if(s.weight)t2+=` ${s.weight}kg`;
      if(s.reps)t2+=`×${s.reps}회`;
      return t2;
    }).join('  ');
    ctx.fillStyle=currentTheme==='white'?'#777':'#888';
    ctx.font='26px Arial'; ctx.fillText(strs, 80, y); y+=40;
    ctx.font='32px Arial';
    if(y>900)return;
  });

  // note
  if(r.note){
    ctx.fillStyle=currentTheme==='white'?'#777':'#666';
    ctx.font='italic 26px Arial';
    ctx.fillText(`"${r.note.slice(0,60)}${r.note.length>60?'...':''}"`, 60, Math.min(y+20,980));
  }

  // bottom accent
  ctx.fillStyle=t.acc; ctx.fillRect(0,1072,1080,8);

  canvas.toBlob(blob=>{
    if(navigator.share&&blob){
      const file=new File([blob],'workout.png',{type:'image/png'});
      navigator.share({files:[file],title:'오늘 운동 완료!',text:`${r.sessionName} 운동 완료 💪`})
        .catch(()=>downloadCanvas(canvas));
    } else { downloadCanvas(canvas); }
  },'image/png');
}

function downloadCanvas(canvas){
  const a=document.createElement('a');
  a.download='workout-card.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
  showToast('이미지를 저장했어요. 인스타에 공유하세요 📸');
}

// ══════════════════════════════════════════
// ICS EXPORT
// ══════════════════════════════════════════
function exportICS(id){
  const hist=getHist();
  const r=hist.find(x=>x.id===id);
  if(!r)return;
  const d=new Date(r.date);
  const fmt=dt=>[
    dt.getUTCFullYear(),
    String(dt.getUTCMonth()+1).padStart(2,'0'),
    String(dt.getUTCDate()).padStart(2,'0'),
    'T',
    String(dt.getUTCHours()).padStart(2,'0'),
    String(dt.getUTCMinutes()).padStart(2,'0'),
    '00Z'
  ].join('');
  const end=new Date(d.getTime()+60*60*1000);
  let desc=`운동: ${r.sessionName}\\n`;
  Object.entries(r.exercises).forEach(([ex,sets])=>{
    const strs=sets.map((s,i)=>{let t=`${i+1}세트`;if(s.weight)t+=` ${s.weight}kg`;if(s.reps)t+=`×${s.reps}회`;return t;}).join(', ');
    desc+=`${ex}: ${strs}\\n`;
  });
  if(r.note)desc+=`\\n메모: ${r.note}`;
  const ics=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//WorkoutApp//KO\r\nBEGIN:VEVENT\r\nUID:${r.id}@workoutapp\r\nDTSTAMP:${fmt(new Date())}\r\nDTSTART:${fmt(d)}\r\nDTEND:${fmt(end)}\r\nSUMMARY:💪 ${r.sessionName} 운동 완료\r\nDESCRIPTION:${desc}\r\nEND:VEVENT\r\nEND:VCALENDAR`;
  const blob=new Blob([ics],{type:'text/calendar'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`workout-${d.toISOString().slice(0,10)}.ics`;
  a.click();
  showToast('캘린더 파일을 저장했어요 📅');
}

function deleteRecord(id){
  if(!confirm('이 기록을 삭제할까요?'))return;
  const h=getHist().filter(x=>x.id!==id);
  saveHist(h); selectedDate=null; renderCalendar();
  showToast('기록을 삭제했어요');
}

// ══════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════
function renderSettings(){
  const body=document.getElementById('settings-body');
  const themeCards=THEMES.map(t=>`
    <div class="theme-card ${currentTheme===t.id?'active-theme':''}" onclick="setTheme('${t.id}')">
      <div class="theme-check">✓</div>
      <div class="theme-preview">
        <div class="tp-circle" style="background:${t.preview[0]};border:1px solid #444;"></div>
        <div class="tp-circle" style="background:${t.preview[1]};border:1px solid #444;"></div>
        <div class="tp-circle" style="background:${t.preview[2]};"></div>
      </div>
      <div class="theme-name">${t.name}</div>
    </div>`).join('');

  const hist=getHist();
  const totalWorkouts=hist.length;
  const thisMonth=hist.filter(r=>{const d=new Date(r.date);const n=new Date();return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear();}).length;

  body.innerHTML=`
    <div class="settings-section">
      <div class="settings-title">테마</div>
      <div class="theme-grid">${themeCards}</div>
    </div>
    <div class="settings-section">
      <div class="settings-title">통계</div>
      <div class="settings-row">
        <div><div class="settings-row-label">총 운동 횟수</div></div>
        <div class="settings-row-right">${totalWorkouts}회</div>
      </div>
      <div class="settings-row">
        <div><div class="settings-row-label">이번 달 운동</div></div>
        <div class="settings-row-right">${thisMonth}회</div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-title">데이터</div>
      <div class="settings-row" onclick="exportAll()" style="cursor:pointer;">
        <div>
          <div class="settings-row-label">전체 기록 백업</div>
          <div class="settings-row-sub">JSON 파일로 내보내기</div>
        </div>
        <div class="settings-row-right">›</div>
      </div>
      <div class="settings-row" onclick="importAll()" style="cursor:pointer;">
        <div>
          <div class="settings-row-label">기록 복원</div>
          <div class="settings-row-sub">백업 파일에서 불러오기</div>
        </div>
        <div class="settings-row-right">›</div>
      </div>
    </div>`;
}

function setTheme(id){
  applyTheme(id);
  renderSettings();
}

function exportAll(){
  const data={routines,history:getHist(),exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`workout-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('백업 파일을 저장했어요');
}

function importAll(){
  const input=document.createElement('input');
  input.type='file'; input.accept='.json';
  input.onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.routines)routines=data.routines;
        if(data.history)saveHist(data.history);
        saveR(); renderSettings();
        showToast('데이터를 복원했어요 ✓');
      }catch(e){showToast('파일을 읽을 수 없어요');}
    };
    reader.readAsText(f);
  };
  input.click();
}

// ══════════════════════════════════════════
// EDIT MODAL
// ══════════════════════════════════════════
let editDraft=null;
function openEditModal(){
  const r=getR();
  editDraft=r?{name:r.name,exercises:[...r.exercises]}:{name:'',exercises:[]};
  document.getElementById('edit-title').textContent=`${DAYS_FULL[state.activeDay]} ${state.week}주차 편집`;
  renderEditBody();
  document.getElementById('edit-modal').classList.add('open');
}
function renderEditBody(){
  const b=document.getElementById('edit-body');
  let h=`<div class="edit-sec"><div class="edit-sec-title">세션 이름</div>
    <input class="name-input" id="edit-name" type="text" placeholder="예: 가슴 너비" value="${editDraft.name.replace(/"/g,'&quot;')}" oninput="editDraft.name=this.value">
  </div><div class="edit-sec"><div class="edit-sec-title">운동 목록</div>`;
  editDraft.exercises.forEach((ex,i)=>{
    h+=`<div class="edit-row">
      <input class="edit-input" type="text" value="${ex.replace(/"/g,'&quot;')}" placeholder="운동 이름" oninput="editDraft.exercises[${i}]=this.value">
      <button class="del-btn" onclick="delEx(${i})">✕</button></div>`;
  });
  h+=`<button class="edit-add-btn" onclick="addEx()">+ 운동 추가</button>`;
  if(routines[rKey()])h+=`<div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border);">
    <button class="danger-btn" onclick="delRoutine()">이 날 루틴 삭제</button></div>`;
  h+='</div>';
  b.innerHTML=h;
}
function addEx(){editDraft.exercises.push('');renderEditBody();setTimeout(()=>{const ins=document.querySelectorAll('.edit-input');if(ins.length)ins[ins.length-1].focus();},50);}
function delEx(i){editDraft.exercises.splice(i,1);renderEditBody();}
function delRoutine(){if(!confirm('이 날 루틴을 삭제할까요?'))return;delete routines[rKey()];saveR();closeModal('edit-modal');window._exp=new Set();renderToday();showToast('루틴을 삭제했어요');}
function saveEdit(){
  const name=editDraft.name.trim();
  const exs=editDraft.exercises.map(e=>e.trim()).filter(Boolean);
  if(!name){showToast('세션 이름을 입력해주세요');return;}
  if(!exs.length){showToast('운동을 하나 이상 추가해주세요');return;}
  routines[rKey()]={name,exercises:exs};saveR();closeModal('edit-modal');window._exp=new Set();renderToday();showToast('루틴이 저장됐어요 ✓');
}

// ══════════════════════════════════════════
// RECORD MODAL
// ══════════════════════════════════════════
let pendingPhoto=null;
function buildSumHTML(){
  const r=getR();if(!r)return'';
  let h=`<div class="sum-label">${r.name} · ${state.week}주차 ${DAYS_FULL[state.activeDay]}</div>`;
  r.exercises.forEach(ex=>{
    const sets=(state.sets[sKey(ex)]||[]).filter(s=>s.done);if(!sets.length)return;
    const strs=sets.map((s,i)=>{let t=`${i+1}세트`;if(s.weight)t+=` ${s.weight}kg`;if(s.reps)t+=` × ${s.reps}회`;return t;}).join(' · ');
    h+=`<div class="sum-ex-row"><div class="sum-ex-name">${ex}</div><div class="sum-ex-sets">${strs}</div></div>`;
  });
  return h;
}
document.getElementById('finish-btn').addEventListener('click',()=>{
  document.getElementById('modal-summary').innerHTML=buildSumHTML();
  document.getElementById('note-input').value='';
  document.getElementById('photo-prev').classList.remove('visible');
  document.getElementById('photo-label').textContent='사진 첨부 (선택)';
  pendingPhoto=null;
  document.getElementById('record-modal').classList.add('open');
});
document.getElementById('photo-input').addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    pendingPhoto=e.target.result;
    const p=document.getElementById('photo-prev');
    p.src=pendingPhoto;p.classList.add('visible');
    document.getElementById('photo-label').textContent='사진 변경';
  };
  reader.readAsDataURL(f);
});
function saveRecord(){
  const r=getR();if(!r)return;
  const exercises={};
  r.exercises.forEach(ex=>{const s=(state.sets[sKey(ex)]||[]).filter(s=>s.done);if(s.length)exercises[ex]=s;});
  const record={id:Date.now(),date:new Date().toISOString(),week:state.week,day:state.activeDay,sessionName:r.name,exercises,note:document.getElementById('note-input').value.trim(),photo:pendingPhoto||null};
  const h=getHist();h.unshift(record);saveHist(h);
  closeModal('record-modal');
  showToast('저장 완료! 기록 탭에서 확인하세요 💪');
  setTimeout(()=>showScreen('history'),900);
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function closeModal(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
['record-modal','edit-modal'].forEach(id=>{document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModal(id);});});

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
applyTheme(currentTheme);
loadData();
renderToday();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
