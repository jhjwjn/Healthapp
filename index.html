<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="운동루틴">
<meta name="theme-color" id="theme-color-meta" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>우리 운동 루틴</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ── THEMES ── */
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;
  --accent:#C8FF00;--accent-dim:rgba(200,255,0,0.12);--accent-border:rgba(200,255,0,0.3);
  --text:#f0f0f0;--text2:#888;--text3:#444;--red:#ff4444;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
body.t-red{--bg:#080000;--surface:#140000;--surface2:#1e0000;--border:#360e0e;--accent:#FF3030;--accent-dim:rgba(255,48,48,0.12);--accent-border:rgba(255,48,48,0.3);--text:#f5efef;--text2:#995555;--text3:#552222;}
body.t-navy{--bg:#05070e;--surface:#0c1020;--surface2:#141828;--border:#1e2a40;--accent:#D4AF37;--accent-dim:rgba(212,175,55,0.12);--accent-border:rgba(212,175,55,0.3);--text:#e6e9f0;--text2:#5566aa;--text3:#2a3860;}
body.t-white{--bg:#f4f4f2;--surface:#ffffff;--surface2:#ebebea;--border:#d8d8d4;--accent:#0d0d0d;--accent-dim:rgba(13,13,13,0.07);--accent-border:rgba(13,13,13,0.18);--text:#0d0d0d;--text2:#666662;--text3:#aaaaaa;--red:#cc2222;}

/* ── BASE ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
.pad{padding:14px 18px;padding-bottom:calc(80px + var(--safe-bottom));}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);}
.topbar-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.pill{height:30px;padding:0 12px;border-radius:20px;border:1px solid var(--accent-border);background:var(--accent-dim);color:var(--accent);font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.ghost-btn{height:30px;padding:0 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}

/* ── NAV ── */
.nav{display:flex;align-items:center;border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);flex-shrink:0;background:var(--bg);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 0;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:9px;font-family:'Noto Sans KR',sans-serif;}
.nav-btn svg{width:20px;height:20px;}
.nav-btn.on{color:var(--accent);}

/* ── HOME ── */
.streak-bar{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;}
.streak-num{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--accent);line-height:1;}
.streak-label{font-size:11px;color:var(--text2);}
.streak-days{display:flex;gap:4px;margin-top:3px;}
.streak-d{width:18px;height:18px;border-radius:4px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--text3);}
.streak-d.hit{background:var(--accent);color:var(--bg);font-weight:700;}
.week-toggle{display:flex;gap:8px;margin-bottom:14px;}
.w-btn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;}
.w-btn.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:500;}
.day-tabs{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.day-tabs::-webkit-scrollbar{display:none;}
.d-tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 11px;border-radius:10px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;}
.d-tab span{font-size:12px;font-weight:500;color:var(--text2);}
.d-tab i{width:4px;height:4px;border-radius:50%;background:transparent;}
.d-tab.hw i{background:var(--text3);}
.d-tab.on{border-color:var(--accent);background:var(--accent-dim);}
.d-tab.on span{color:var(--accent);}
.d-tab.on i{background:var(--accent);}
.session-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:14px;}
.session-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;}
.session-tag{display:inline-block;margin-top:3px;padding:2px 8px;border-radius:20px;background:var(--accent-dim);border:1px solid var(--accent-border);font-size:10px;color:var(--accent);}
.prog-wrap{margin-bottom:14px;}
.prog-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px;}
.prog-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}

/* exercise cards */
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s;}
.ex-card.all-done{border-color:var(--accent-border);}
.ex-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.ex-chk{width:22px;height:22px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--text3);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;}
.ex-chk.on{background:var(--accent);border-color:var(--accent);}
.ex-chk svg{display:none;}
.ex-chk.on svg{display:block;}
.ex-name{flex:1;font-size:14px;font-weight:500;}
.ex-meta{font-size:11px;color:var(--text2);}
.ex-arr{font-size:16px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.ex-card.open .ex-arr{transform:rotate(180deg);}
.ex-body{display:none;border-top:1px solid var(--border);padding:12px 14px;}
.ex-card.open .ex-body{display:block;}

/* set rows */
.set-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.set-label{font-size:11px;color:var(--text3);width:28px;flex-shrink:0;}
.set-inputs{display:flex;gap:5px;flex:1;align-items:center;}
.set-field{display:flex;flex-direction:column;gap:2px;flex:1;}
.set-field label{font-size:9px;color:var(--text3);}
.set-field input{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 8px;font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;width:100%;outline:none;transition:border-color .15s;}
.set-field input:focus{border-color:var(--accent);}
.set-done-btn{width:30px;height:30px;border-radius:7px;flex-shrink:0;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:14px;}
.set-done-btn.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.set-warmup-btn{width:26px;height:26px;border-radius:6px;flex-shrink:0;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:14px;font-family:'Noto Sans KR',sans-serif;transition:all .15s;}
.set-warmup-btn.on{background:rgba(255,200,0,0.15);border-color:rgba(255,200,0,0.5);color:#ffcc00;}
.set-del-btn{width:26px;height:26px;border-radius:6px;flex-shrink:0;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;margin-top:14px;}
.set-del-btn:active{border-color:var(--red);color:var(--red);}
.add-set-btn{width:100%;padding:7px;border-radius:7px;margin-top:2px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.pr-badge{display:inline-flex;align-items:center;gap:3px;background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:20px;padding:2px 8px;font-size:10px;color:var(--accent);margin-bottom:8px;}
.rest-state{text-align:center;padding:44px 0 20px;color:var(--text3);}
.action-bar{display:flex;gap:10px;margin-top:14px;}
.btn-record{flex:1;padding:15px;border-radius:13px;border:1.5px solid var(--accent-border);background:var(--accent-dim);color:var(--accent);font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .15s;}
.btn-record:disabled{opacity:.3;}
.btn-start{flex:1;padding:15px;border-radius:13px;border:none;background:var(--accent);color:var(--bg);font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .15s;}
.btn-start:disabled{opacity:.3;}

/* ── WORKOUT MODE ── */
#screen-workout{background:var(--bg);z-index:50;}
.wk-topbar{display:flex;align-items:center;gap:12px;padding:14px 18px 0;flex-shrink:0;}
.wk-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wk-prog-wrap{flex:1;}
.wk-prog-label{font-size:10px;color:var(--text2);margin-bottom:4px;}
.wk-prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.wk-prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
.wk-elapsed{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--text2);letter-spacing:1px;flex-shrink:0;}
.wk-scroll{flex:1;overflow-y:auto;padding:18px 18px 0;}
.wk-scroll::-webkit-scrollbar{display:none;}
.wk-ex-label{font-size:10px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;}
.wk-ex-name{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:1px;line-height:1;margin-bottom:4px;}
.wk-ex-sub{font-size:12px;color:var(--text2);margin-bottom:18px;}
.wk-pips{display:flex;gap:5px;margin-bottom:18px;}
.wk-pip{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .3s;}
.wk-pip.done{background:var(--accent);}
.wk-pip.cur{background:var(--accent);opacity:.45;}
.wk-pip.warmup{background:#ffcc00;opacity:.6;}
.wk-set-card{background:var(--surface);border:1px solid var(--accent-border);border-radius:18px;padding:18px;margin-bottom:14px;}
.wk-set-title{font-size:10px;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.wk-warmup-tag{background:rgba(255,200,0,0.15);border:1px solid rgba(255,200,0,0.4);border-radius:10px;padding:1px 7px;font-size:9px;color:#ffcc00;}
.wk-set-vals{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:6px;}
.wk-big-val{font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:2px;line-height:1;color:var(--text);}
.wk-big-sep{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--text3);padding:0 8px;align-self:flex-end;padding-bottom:8px;}
.wk-big-unit{font-size:14px;color:var(--text2);align-self:flex-end;padding-bottom:12px;margin-left:2px;}
.wk-prev-hint{font-size:11px;color:var(--text2);text-align:center;margin-bottom:14px;}
.wk-pr-badge{display:inline-flex;align-items:center;gap:3px;background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--accent);margin-bottom:12px;width:100%;justify-content:center;}
.wk-actions{display:flex;gap:8px;margin-bottom:10px;}
.wk-skip{flex:1;padding:13px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.wk-skip:active{border-color:var(--red);color:var(--red);}
.wk-done{flex:2;padding:13px;border-radius:12px;border:none;background:var(--accent);color:var(--bg);font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:transform .1s;}
.wk-done:active{transform:scale(.97);}
.wk-add-ex-btn{width:100%;padding:11px;border-radius:10px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-bottom:14px;}
.wk-add-ex-btn:active{border-color:var(--accent);color:var(--accent);}
.wk-next{background:var(--surface);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.wk-next-lbl{font-size:10px;color:var(--text3);}
.wk-next-name{font-size:12px;font-weight:500;margin-top:1px;}
.rest-overlay{display:none;position:absolute;inset:0;background:var(--bg);z-index:10;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
.rest-overlay.show{display:flex;}
.rest-ring-wrap{position:relative;width:190px;height:190px;margin-bottom:20px;}
.rest-ring-wrap svg{position:absolute;inset:0;transform:rotate(-90deg);}
.rest-ring-bg{fill:none;stroke:var(--border);stroke-width:6;}
.rest-ring-fill{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .9s linear;}
.rest-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.rest-sec{font-family:'Bebas Neue',sans-serif;font-size:60px;letter-spacing:2px;color:var(--accent);line-height:1;}
.rest-lbl{font-size:11px;color:var(--text2);}
.rest-next{font-size:12px;color:var(--text2);margin-bottom:20px;}
.rest-btns{display:flex;gap:8px;width:100%;}
.rest-skip-btn{flex:1;padding:13px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.rest-add-btn{padding:13px 18px;border-radius:11px;border:1px solid var(--accent-border);background:var(--accent-dim);color:var(--accent);font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* ── RECORDS TAB ── */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px;}
.stat-lbl{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);letter-spacing:1px;line-height:1;}
.stat-sub{font-size:10px;color:var(--text2);margin-top:1px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px;}
.cal-dow{text-align:center;font-size:9px;color:var(--text3);padding:4px 0;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.cal-day.empty{cursor:default;}
.cal-day.today{border-color:var(--accent-border);}
.cal-day.has-r{background:var(--accent-dim);}
.cal-day.sel{background:var(--accent);}
.cal-day-n{font-size:11px;font-weight:500;color:var(--text2);}
.cal-day.today .cal-day-n{color:var(--accent);}
.cal-day.has-r .cal-day-n{color:var(--text);}
.cal-day.sel .cal-day-n{color:var(--bg);font-weight:700;}
.cal-dot{width:3px;height:3px;border-radius:50%;background:var(--accent);margin-top:1px;}
.cal-day.sel .cal-dot{background:var(--bg);}
.rec-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:13px;margin-bottom:9px;}
.rec-date{font-size:10px;color:var(--accent);font-weight:500;margin-bottom:3px;}
.rec-session{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;margin-bottom:2px;}
.rec-duration{font-size:10px;color:var(--text2);margin-bottom:8px;}
.rec-photo{width:100%;border-radius:7px;margin-bottom:8px;object-fit:cover;max-height:200px;display:block;}
.rec-note{font-size:11px;color:var(--text2);line-height:1.6;white-space:pre-wrap;padding:7px 9px;background:var(--surface2);border-radius:7px;margin-bottom:8px;}
.rec-ex-block{margin-bottom:7px;}
.rec-ex-name{font-size:12px;font-weight:500;margin-bottom:2px;display:flex;align-items:center;gap:5px;}
.rec-pr-tag{font-size:9px;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border);padding:1px 5px;border-radius:8px;}
.rec-set-row{font-size:11px;color:var(--text2);padding:1px 0;display:flex;gap:6px;align-items:center;}
.rec-set-n{color:var(--text3);width:28px;}
.warmup-tag{font-size:9px;background:rgba(255,200,0,0.15);color:#ffcc00;border-radius:4px;padding:0 4px;}
.rec-acts{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.rec-act{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:10px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;}
.rec-act:active{border-color:var(--accent);color:var(--accent);}
.rec-del{padding:8px 11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:10px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.rec-del:active{border-color:var(--red);color:var(--red);}
.no-rec{text-align:center;padding:24px 0;color:var(--text3);font-size:12px;}
.report-btn{width:100%;padding:11px;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:5px;}
.report-btn:active{border-color:var(--accent);color:var(--accent);}

/* ── BODY TAB ── */
.body-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.body-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:11px;text-align:center;}
.body-card-lbl{font-size:9px;color:var(--text3);margin-bottom:3px;}
.body-card-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);line-height:1;}
.body-card-unit{font-size:9px;color:var(--text2);margin-top:1px;}
.body-add-btn{width:100%;padding:13px;border-radius:12px;background:var(--accent);border:none;color:var(--bg);font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-bottom:16px;}
.graph-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.graph-tabs::-webkit-scrollbar{display:none;}
.graph-tab{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;}
.graph-tab.on{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}
.graph-wrap{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px;margin-bottom:14px;}
.graph-title{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
.graph-canvas-wrap{position:relative;height:140px;width:100%;}
.graph-canvas-wrap canvas{width:100%;height:100%;}
.body-hist-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);}
.body-hist-item:last-child{border-bottom:none;}
.body-hist-date{font-size:11px;color:var(--text2);}
.body-hist-vals{display:flex;gap:10px;align-items:center;}
.body-hist-main{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);letter-spacing:.5px;}
.body-hist-sub{font-size:10px;color:var(--text2);}
.body-hist-del{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.body-hist-del:active{border-color:var(--red);color:var(--red);}
.no-body{text-align:center;padding:40px 0;color:var(--text3);font-size:13px;}

/* vol chart */
.vol-wrap{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px;margin-bottom:14px;}
.vol-title{font-size:9px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.vol-bars{display:flex;align-items:flex-end;gap:3px;height:70px;}
.vol-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.vol-bar{width:100%;border-radius:3px 3px 0 0;background:var(--border);min-height:4px;}
.vol-bar.today{background:var(--accent);}
.vol-bar-lbl{font-size:8px;color:var(--text3);}

/* ── SETTINGS ── */
.settings-sec{margin-bottom:22px;}
.settings-sec-title{font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:9px;}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.theme-card{padding:13px;border-radius:11px;border:1.5px solid var(--border);cursor:pointer;transition:border-color .2s;position:relative;}
.theme-card.on{border-color:var(--accent);}
.theme-prev{display:flex;gap:4px;margin-bottom:7px;}
.tp{width:16px;height:16px;border-radius:50%;}
.theme-name{font-size:11px;font-weight:500;}
.theme-chk{position:absolute;top:9px;right:9px;width:15px;height:15px;border-radius:50%;background:var(--accent);display:none;align-items:center;justify-content:center;font-size:8px;color:var(--bg);}
.theme-card.on .theme-chk{display:flex;}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.set-row-lbl{font-size:12px;}
.set-row-sub{font-size:10px;color:var(--text2);margin-top:1px;}
.set-row-right{font-size:11px;color:var(--accent);}
.rest-opts{display:flex;gap:7px;margin-top:9px;}
.rest-opt{flex:1;padding:9px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:center;}
.rest-opt.on{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);}

/* ── SHEETS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:flex-end;}
.overlay.open{display:flex;}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;}
.sheet-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:13px auto 0;flex-shrink:0;}
.sheet-hdr{padding:11px 16px 9px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.sheet-title{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:1px;}
.sheet-body{flex:1;overflow-y:auto;padding:13px 16px;}
.sheet-body::-webkit-scrollbar{display:none;}
.sheet-ftr{padding:10px 16px;padding-bottom:calc(10px + var(--safe-bottom));border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:7px;background:var(--surface);}
.s-cancel{flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.s-save{flex:2;padding:12px;border-radius:10px;border:none;background:var(--accent);color:var(--bg);font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.sum-block{background:var(--surface2);border-radius:9px;padding:11px;margin-bottom:12px;}
.sum-lbl{font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;}
.sum-ex-row{margin-bottom:5px;}
.sum-ex-name{font-size:12px;font-weight:500;margin-bottom:1px;}
.sum-ex-sets{font-size:10px;color:var(--text2);}
.photo-area{border:1.5px dashed var(--border);border-radius:9px;padding:16px;text-align:center;cursor:pointer;margin-bottom:11px;display:block;}
.photo-area p{font-size:11px;color:var(--text3);margin-top:3px;}
.photo-prev-img{width:100%;border-radius:7px;margin-bottom:11px;display:none;}
.photo-prev-img.show{display:block;}
.note-area{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 11px;color:var(--text);font-size:12px;font-family:'Noto Sans KR',sans-serif;resize:none;outline:none;line-height:1.6;margin-bottom:5px;}
.note-area:focus{border-color:var(--accent);}
.e-sec{margin-bottom:18px;}
.e-sec-title{font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;}
.e-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.e-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;}
.e-input:focus{border-color:var(--accent);}
.e-del{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.e-del:active{border-color:var(--red);color:var(--red);}
.e-add{width:100%;padding:8px;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.name-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-weight:500;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:4px;}
.name-input:focus{border-color:var(--accent);}
.danger-btn{width:100%;padding:10px;border-radius:8px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
/* inbody sheet fields */
.inbody-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.inbody-field{display:flex;flex-direction:column;gap:4px;}
.inbody-field label{font-size:10px;color:var(--text2);}
.inbody-field input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:15px;color:var(--text);font-family:'Bebas Neue',sans-serif;outline:none;transition:border-color .15s;letter-spacing:.5px;}
.inbody-field input:focus{border-color:var(--accent);}

/* ── ONBOARDING ── */
.ob-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:500;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;padding-top:calc(32px + var(--safe-top));padding-bottom:calc(32px + var(--safe-bottom));}
.ob-overlay.show{display:flex;}
.ob-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:4px;color:var(--accent);margin-bottom:6px;}
.ob-tagline{font-size:13px;color:var(--text2);margin-bottom:40px;text-align:center;}
.ob-steps{display:flex;gap:6px;margin-bottom:32px;}
.ob-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .3s;}
.ob-dot.on{background:var(--accent);}
.ob-step{display:none;flex-direction:column;align-items:center;text-align:center;width:100%;max-width:320px;}
.ob-step.show{display:flex;}
.ob-icon{font-size:52px;margin-bottom:16px;line-height:1;}
.ob-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;margin-bottom:8px;}
.ob-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:24px;}
.ob-name-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:18px;text-align:center;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;margin-bottom:24px;transition:border-color .15s;}
.ob-name-input:focus{border-color:var(--accent);}
.ob-rest-opts{display:flex;gap:8px;width:100%;margin-bottom:24px;}
.ob-rest-opt{flex:1;padding:14px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;text-align:center;transition:all .15s;}
.ob-rest-opt.on{border-color:var(--accent);background:var(--accent-dim);color:var(--accent);font-weight:700;}
.ob-btn{width:100%;padding:16px;border-radius:14px;background:var(--accent);border:none;color:var(--bg);font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.ob-btn:disabled{opacity:.3;}
.ob-skip{margin-top:14px;font-size:12px;color:var(--text3);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'Noto Sans KR',sans-serif;}

/* celebrate */
.celebrate{display:none;position:fixed;inset:0;z-index:200;pointer-events:none;overflow:hidden;}
.celebrate.show{display:block;}
.confetti{position:absolute;animation:fall linear forwards;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
/* toast */
.toast{position:fixed;bottom:calc(65px + var(--safe-bottom) + 8px);left:50%;transform:translateX(-50%) translateY(14px);background:var(--surface2);border:1px solid var(--border);padding:8px 16px;border-radius:16px;font-size:12px;color:var(--text);opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div class="ob-overlay" id="ob-overlay">
  <div class="ob-logo">WORKOUT</div>
  <div class="ob-tagline">나만의 운동 루틴 트래커</div>
  <div class="ob-steps">
    <div class="ob-dot on" id="od0"></div>
    <div class="ob-dot" id="od1"></div>
    <div class="ob-dot" id="od2"></div>
  </div>
  <div id="ob-step-0" class="ob-step show">
    <div class="ob-icon">👋</div>
    <div class="ob-title">반가워요!</div>
    <div class="ob-desc">운동 기록에 표시될 이름을 알려주세요</div>
    <input class="ob-name-input" id="ob-name" type="text" placeholder="이름 입력" maxlength="10" oninput="document.getElementById('ob-btn0').disabled=!this.value.trim()">
    <button class="ob-btn" id="ob-btn0" onclick="obGo(1)" disabled>다음</button>
  </div>
  <div id="ob-step-1" class="ob-step">
    <div class="ob-icon">⏱️</div>
    <div class="ob-title">휴식 시간</div>
    <div class="ob-desc">세트 사이 기본 휴식 시간을 설정해요</div>
    <div class="ob-rest-opts">
      <button class="ob-rest-opt" onclick="obRest(60)">1분</button>
      <button class="ob-rest-opt on" onclick="obRest(120)">2분</button>
      <button class="ob-rest-opt" onclick="obRest(300)">5분</button>
    </div>
    <button class="ob-btn" onclick="obGo(2)">다음</button>
  </div>
  <div id="ob-step-2" class="ob-step">
    <div class="ob-icon">💪</div>
    <div class="ob-title">준비 완료!</div>
    <div class="ob-desc">루틴이 미리 설정돼 있어요<br>홈에서 요일별로 계획하고 기록하거나<br>가이드 모드로 운동을 시작하세요</div>
    <button class="ob-btn" onclick="obFinish()">시작하기</button>
  </div>
  <button class="ob-skip" onclick="obFinish()">건너뛰기</button>
</div>

<div id="app">
  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="topbar">
      <div><div class="topbar-title">WORKOUT</div><div class="topbar-sub" id="home-date"></div></div>
      <button class="pill" id="week-pill">1주차</button>
    </div>
    <div class="scroll pad" id="home-body"></div>
  </div>

  <!-- WORKOUT MODE -->
  <div class="screen" id="screen-workout" style="position:relative;">
    <div class="wk-topbar">
      <button class="wk-close" onclick="exitWorkout()">✕</button>
      <div class="wk-prog-wrap">
        <div class="wk-prog-label" id="wk-prog-lbl">1/4 종목</div>
        <div class="wk-prog-bar"><div class="wk-prog-fill" id="wk-prog-fill" style="width:0%"></div></div>
      </div>
      <div class="wk-elapsed" id="wk-elapsed">00:00</div>
    </div>
    <div class="wk-scroll" id="wk-body"></div>
    <div class="rest-overlay" id="rest-overlay">
      <div style="font-size:10px;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;">휴식 중</div>
      <div class="rest-ring-wrap">
        <svg viewBox="0 0 190 190" width="190" height="190">
          <circle class="rest-ring-bg" cx="95" cy="95" r="84"/>
          <circle class="rest-ring-fill" id="rest-ring" cx="95" cy="95" r="84"/>
        </svg>
        <div class="rest-num"><div class="rest-sec" id="rest-sec">60</div><div class="rest-lbl">초 후 다음 세트</div></div>
      </div>
      <div class="rest-next" id="rest-next-hint"></div>
      <div class="rest-btns">
        <button class="rest-skip-btn" onclick="skipRest()">건너뛰기</button>
        <button class="rest-add-btn" onclick="addRest(30)">+30초</button>
      </div>
    </div>
  </div>

  <!-- RECORDS -->
  <div class="screen" id="screen-records">
    <div class="topbar">
      <div><div class="topbar-title">RECORDS</div><div class="topbar-sub" id="cal-label"></div></div>
      <div style="display:flex;gap:5px;">
        <button class="ghost-btn" onclick="changeMonth(-1)">‹</button>
        <button class="ghost-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="scroll pad" id="records-body"></div>
  </div>

  <!-- BODY -->
  <div class="screen" id="screen-body">
    <div class="topbar">
      <div><div class="topbar-title">BODY</div><div class="topbar-sub" id="body-date-label"></div></div>
    </div>
    <div class="scroll pad" id="body-body"></div>
  </div>

  <!-- SETTINGS -->
  <div class="screen" id="screen-settings">
    <div class="topbar"><div><div class="topbar-title">SETTINGS</div><div class="topbar-sub">설정</div></div></div>
    <div class="scroll pad" id="settings-body"></div>
  </div>

  <nav class="nav">
    <button class="nav-btn on" id="nav-home" onclick="showScreen('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>홈
    </button>
    <button class="nav-btn" id="nav-records" onclick="showScreen('records')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>기록
    </button>
    <button class="nav-btn" id="nav-body" onclick="showScreen('body')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>바디
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showScreen('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l-.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>설정
    </button>
  </nav>
</div>

<!-- RECORD SAVE SHEET -->
<div class="overlay" id="record-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr"><div class="sheet-title">운동 기록 저장</div></div>
    <div class="sheet-body">
      <div class="sum-block" id="rec-summary"></div>
      <img class="photo-prev-img" id="photo-prev" src="" alt="">
      <label class="photo-area" for="photo-input">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="1.5"><rect x="3" y="5" width="18" height="15" rx="2"/><circle cx="8.5" cy="10.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
        <p id="photo-label">사진 첨부 (선택)</p>
        <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none">
      </label>
      <textarea class="note-area" id="note-input" rows="3" placeholder="오늘 운동 소감 (선택)"></textarea>
    </div>
    <div class="sheet-ftr">
      <button class="s-cancel" onclick="closeSheet('record-sheet')">취소</button>
      <button class="s-save" onclick="saveRecord()">저장하기</button>
    </div>
  </div>
</div>

<!-- EDIT SHEET -->
<div class="overlay" id="edit-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr"><div class="sheet-title" id="edit-title">루틴 편집</div></div>
    <div class="sheet-body" id="edit-body"></div>
    <div class="sheet-ftr">
      <button class="s-cancel" onclick="closeSheet('edit-sheet')">취소</button>
      <button class="s-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<!-- ADD EXERCISE SHEET (workout mode) -->
<div class="overlay" id="addex-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr"><div class="sheet-title">종목 추가</div></div>
    <div class="sheet-body">
      <div class="e-sec">
        <div class="e-sec-title">종목 이름</div>
        <input class="name-input" id="addex-name" type="text" placeholder="예: 케이블 크로스오버">
      </div>
      <div class="e-sec">
        <div class="e-sec-title">세트 구성</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
          <div class="inbody-field"><label>세트 수</label><input id="addex-sets" type="number" inputmode="numeric" value="3" min="1" max="10"></div>
          <div class="inbody-field"><label>중량 (kg)</label><input id="addex-weight" type="number" inputmode="decimal" value="0"></div>
          <div class="inbody-field"><label>횟수</label><input id="addex-reps" type="number" inputmode="numeric" value="10"></div>
        </div>
      </div>
    </div>
    <div class="sheet-ftr">
      <button class="s-cancel" onclick="closeSheet('addex-sheet')">취소</button>
      <button class="s-save" onclick="confirmAddEx()">추가</button>
    </div>
  </div>
</div>

<!-- INBODY SHEET -->
<div class="overlay" id="inbody-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr"><div class="sheet-title">인바디 기록</div></div>
    <div class="sheet-body">
      <div class="inbody-grid" style="margin-bottom:16px;">
        <div class="inbody-field"><label>체중 (kg)</label><input id="ib-weight" type="number" inputmode="decimal" placeholder="0.0"></div>
        <div class="inbody-field"><label>골격근량 (kg)</label><input id="ib-muscle" type="number" inputmode="decimal" placeholder="0.0"></div>
        <div class="inbody-field"><label>체지방량 (kg)</label><input id="ib-fat" type="number" inputmode="decimal" placeholder="0.0"></div>
        <div class="inbody-field"><label>체지방률 (%)</label><input id="ib-fatpct" type="number" inputmode="decimal" placeholder="0.0"></div>
        <div class="inbody-field"><label>BMI</label><input id="ib-bmi" type="number" inputmode="decimal" placeholder="0.0"></div>
        <div class="inbody-field"><label>내장지방 레벨</label><input id="ib-visceral" type="number" inputmode="numeric" placeholder="0"></div>
      </div>
    </div>
    <div class="sheet-ftr">
      <button class="s-cancel" onclick="closeSheet('inbody-sheet')">취소</button>
      <button class="s-save" onclick="saveInbody()">저장</button>
    </div>
  </div>
</div>

<div class="celebrate" id="celebrate"></div>
<canvas id="share-canvas" style="display:none"></canvas>
<div class="toast" id="toast"></div>

<script>
// ══ CONSTANTS ══
const THEMES=[
  {id:'dark',name:'다크 라임',cls:'',bg:'#0a0a0a',acc:'#C8FF00',p:['#0a0a0a','#141414','#C8FF00']},
  {id:'red',name:'블랙 레드',cls:'t-red',bg:'#080000',acc:'#FF3030',p:['#080000','#140000','#FF3030']},
  {id:'navy',name:'네이비 골드',cls:'t-navy',bg:'#05070e',acc:'#D4AF37',p:['#05070e','#0c1020','#D4AF37']},
  {id:'white',name:'화이트',cls:'t-white',bg:'#f4f4f2',acc:'#0d0d0d',p:['#f4f4f2','#ffffff','#0d0d0d']},
];
const DAYS=['일','월','화','수','목','금','토'];
const DAYS_F=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
const MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DEFAULT_ROUTINES={
  '1-1':{name:'가슴 너비',exercises:['펙덱 플라이','케이블 플라이','덤벨 프레스','인클라인 벤치프레스']},
  '1-3':{name:'등 너비',exercises:['랫풀다운 (중립)','랫풀다운 (와이드)','암풀다운','덤벨로우']},
  '1-5':{name:'하체',exercises:['스쿼트','레그 익스텐션','런지']},
  '1-0':{name:'어깨',exercises:['사이드 레터럴 레이즈','페이스 폴','밀리터리 프레스']},
  '2-1':{name:'가슴 두께',exercises:['인클라인 벤치 프레스','인클라인 덤벨 프레스','펙덱 플라이']},
  '2-3':{name:'등 두께',exercises:['바벨로우','T바로우','덤벨로우','랫풀다운']},
  '2-5':{name:'하체',exercises:['스쿼트','레그 익스텐션','런지']},
  '2-0':{name:'어깨',exercises:['사이드 레터럴 레이즈','페이스 폴','밀리터리 프레스']},
};
const BODY_GRAPH_TABS=[
  {key:'weight',label:'체중',unit:'kg'},
  {key:'muscle',label:'골격근량',unit:'kg'},
  {key:'fat',label:'체지방량',unit:'kg'},
  {key:'fatpct',label:'체지방률',unit:'%'},
  {key:'bmi',label:'BMI',unit:''},
  {key:'visceral',label:'내장지방',unit:''},
  {key:'vol',label:'운동 볼륨',unit:'kg'},
];

// ══ STATE ══
let routines={}, state={week:1,activeDay:new Date().getDay()}, homeSets={};
let currentTheme=localStorage.getItem('theme')||'dark';
let restTime=parseInt(localStorage.getItem('restTime')||'120');
let activeBodyTab='weight';
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth(), calSel=null;

function getPRs(){try{return JSON.parse(localStorage.getItem('prs')||'{}');}catch(e){return{};}}
function savePRs(p){try{localStorage.setItem('prs',JSON.stringify(p));}catch(e){}}
function getHist(){try{return JSON.parse(localStorage.getItem('hist_v6')||'[]');}catch(e){return[];}}
function saveHist(h){try{localStorage.setItem('hist_v6',JSON.stringify(h));}catch(e){}}
function getBodyHist(){try{return JSON.parse(localStorage.getItem('body_hist')||'[]');}catch(e){return[];}}
function saveBodyHist(h){try{localStorage.setItem('body_hist',JSON.stringify(h));}catch(e){}}

function loadData(){
  try{const r=localStorage.getItem('rt_v6');routines=r?JSON.parse(r):JSON.parse(JSON.stringify(DEFAULT_ROUTINES));}
  catch(e){routines=JSON.parse(JSON.stringify(DEFAULT_ROUTINES));}
  try{const s=localStorage.getItem('st_v6');if(s)Object.assign(state,JSON.parse(s));}catch(e){}
  try{const h=localStorage.getItem('hs_v6');if(h)homeSets=JSON.parse(h);}catch(e){}
}
function saveR(){try{localStorage.setItem('rt_v6',JSON.stringify(routines));}catch(e){}}
function saveS(){try{localStorage.setItem('st_v6',JSON.stringify(state));}catch(e){}}
function saveHS(){try{localStorage.setItem('hs_v6',JSON.stringify(homeSets));}catch(e){}}

function rKey(){return state.week+'-'+state.activeDay;}
function getR(){return routines[rKey()]||null;}
function hsKey(ex){return rKey()+'-'+ex;}

function ensureHomeSets(ex){
  const k=hsKey(ex);
  if(!homeSets[k]){
    const prev=getPrevRecord(ex);
    homeSets[k]=Array.from({length:3},(_,i)=>{
      const ps=prev&&prev[i]?prev[i]:{weight:'',reps:''};
      return{weight:ps.weight||'',reps:ps.reps||'',done:false,warmup:false};
    });
  }
  return homeSets[k];
}

function getPrevRecord(exName){
  for(const r of getHist())if(r.exercises&&r.exercises[exName]?.length>0)return r.exercises[exName];
  return null;
}

function getStreak(){
  const dates=new Set(getHist().map(r=>r.date.slice(0,10)));
  let streak=0,d=new Date();d.setHours(0,0,0,0);
  if(!dates.has(d.toISOString().slice(0,10)))d.setDate(d.getDate()-1);
  while(dates.has(d.toISOString().slice(0,10))){streak++;d.setDate(d.getDate()-1);}
  return streak;
}

function applyTheme(id){
  currentTheme=id;const t=THEMES.find(x=>x.id===id)||THEMES[0];
  document.body.className=t.cls;
  document.getElementById('theme-color-meta').content=t.bg;
  localStorage.setItem('theme',id);
}

// ══ SCREENS ══
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('screen-'+name).classList.add('active');
  const nb=document.getElementById('nav-'+name);if(nb)nb.classList.add('on');
  if(name==='records'){calSel=null;renderRecords();}
  if(name==='body')renderBody();
  if(name==='settings')renderSettings();
  if(name==='home')renderHome();
}

// ══ HOME ══
function renderHome(){
  const body=document.getElementById('home-body');
  const routine=getR();const now=new Date();
  const userName=localStorage.getItem('userName')||'';
  document.getElementById('home-date').textContent=now.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'})+(userName?` · ${userName}`:'');
  document.getElementById('week-pill').textContent=state.week+'주차';
  const streak=getStreak();const hist=getHist();
  const mc=hist.filter(r=>{const d=new Date(r.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
  const rdays=[];for(let i=6;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);rdays.push(d);}
  const dd=new Set(hist.map(r=>r.date.slice(0,10)));
  const dots=rdays.map(d=>`<div class="streak-d ${dd.has(d.toISOString().slice(0,10))?'hit':''}">${DAYS[d.getDay()]}</div>`).join('');

  let h=`<div class="streak-bar">
    <div style="font-size:26px;line-height:1;">${streak>0?'🔥':'💤'}</div>
    <div style="flex:1;">
      <div style="display:flex;align-items:baseline;gap:6px;">
        <div class="streak-num">${streak}</div><div class="streak-label">일 연속</div>
        <div style="margin-left:auto;font-size:10px;color:var(--text2);">이번 달 ${mc}회</div>
      </div>
      <div class="streak-days">${dots}</div>
    </div>
  </div>`;

  h+=`<div class="week-toggle">
    <button class="w-btn ${state.week===1?'on':''}" onclick="setWeek(1)">1주차</button>
    <button class="w-btn ${state.week===2?'on':''}" onclick="setWeek(2)">2주차</button>
  </div><div class="day-tabs">`;
  DAYS.forEach((d,i)=>{const hw=!!routines[state.week+'-'+i];h+=`<button class="d-tab ${hw?'hw':''} ${i===state.activeDay?'on':''}" onclick="setDay(${i})"><span>${d}</span><i></i></button>`;});
  h+='</div>';

  if(!routine){
    h+=`<div class="rest-state"><div style="font-size:40px;margin-bottom:8px;">🛌</div><p style="font-size:13px;margin-bottom:14px;">등록된 루틴이 없어요</p><button class="ghost-btn" style="margin:0 auto;" onclick="openEditSheet()">+ 루틴 추가</button></div>`;
    body.innerHTML=h;return;
  }

  h+=`<div class="session-hdr"><div><div class="session-name">${routine.name}</div><span class="session-tag">${DAYS_F[state.activeDay]} · ${state.week}주차</span></div><button class="ghost-btn" onclick="openEditSheet()">✎ 편집</button></div>`;

  const exs=routine.exercises;
  let totalS=0,doneS=0;
  exs.forEach(ex=>{const s=ensureHomeSets(ex);totalS+=s.length;doneS+=s.filter(x=>x.done).length;});
  const pct=totalS>0?Math.round(doneS/totalS*100):0;
  h+=`<div class="prog-wrap"><div class="prog-info"><span>${doneS}/${totalS} 세트 완료</span><span>${pct}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div></div>`;

  const prs=getPRs();
  exs.forEach((ex,ei)=>{
    const sets=ensureHomeSets(ex);
    const allDone=sets.length>0&&sets.every(s=>s.done);
    const doneC=sets.filter(s=>s.done).length;
    const pr=prs[ex];
    const safe=ex.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    h+=`<div class="ex-card ${allDone?'all-done':''}" id="hec${ei}">
      <div class="ex-hdr" onclick="toggleHomeEx(${ei})">
        <div class="ex-chk ${allDone?'on':''}" onclick="event.stopPropagation();toggleAllSets('${safe}')">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="ex-name">${ex}</div>
        <div class="ex-meta">${doneC}/${sets.length}세트</div>
        <div class="ex-arr">⌄</div>
      </div>
      <div class="ex-body">
        ${pr?`<div class="pr-badge">🏆 PR ${pr.weight}kg × ${pr.reps}회</div>`:''}`;
    sets.forEach((set,si)=>{
      h+=`<div class="set-row">
        <div class="set-label">${si+1}세트</div>
        <div class="set-inputs">
          <div class="set-field"><label>중량(kg)</label><input type="number" inputmode="decimal" placeholder="0" value="${set.weight}" onchange="updateHS('${safe}',${si},'weight',this.value)"></div>
          <div class="set-field"><label>횟수</label><input type="number" inputmode="numeric" placeholder="0" value="${set.reps}" onchange="updateHS('${safe}',${si},'reps',this.value)"></div>
          <button class="set-warmup-btn ${set.warmup?'on':''}" onclick="toggleWarmup('${safe}',${si})" title="웜업 세트">W</button>
          <button class="set-done-btn ${set.done?'on':''}" onclick="toggleSetDone('${safe}',${si})">${set.done?'✓':'○'}</button>
          ${sets.length>1?`<button class="set-del-btn" onclick="delHS('${safe}',${si})">✕</button>`:''}
        </div>
      </div>`;
    });
    h+=`<button class="add-set-btn" onclick="addHS('${safe}')">+ 세트 추가</button></div></div>`;
  });

  const anyDone=exs.some(ex=>ensureHomeSets(ex).some(s=>s.done));
  h+=`<div class="action-bar">
    <button class="btn-record" ${!anyDone?'disabled':''} onclick="openRecordSheet()">📋 기록하기</button>
    <button class="btn-start" ${!anyDone?'disabled':''} onclick="startWorkout()">▶ 운동 시작</button>
  </div>`;
  body.innerHTML=h;
  if(window._hopen)window._hopen.forEach(ei=>{const c=document.getElementById('hec'+ei);if(c)c.classList.add('open');});
}

function toggleHomeEx(ei){const c=document.getElementById('hec'+ei);c.classList.toggle('open');if(!window._hopen)window._hopen=new Set();c.classList.contains('open')?window._hopen.add(ei):window._hopen.delete(ei);}
function toggleAllSets(ex){const s=ensureHomeSets(ex),all=s.every(x=>x.done);s.forEach(x=>x.done=!all);saveHS();renderHome();}
function toggleSetDone(ex,si){const s=ensureHomeSets(ex);if(s[si]){s[si].done=!s[si].done;saveHS();renderHome();}}
function toggleWarmup(ex,si){const s=ensureHomeSets(ex);if(s[si]){s[si].warmup=!s[si].warmup;saveHS();renderHome();}}
function updateHS(ex,si,f,v){const s=ensureHomeSets(ex);if(s[si]){s[si][f]=v;saveHS();}}
function addHS(ex){const s=ensureHomeSets(ex);const l=s[s.length-1];s.push({weight:l?.weight||'',reps:l?.reps||'',done:false,warmup:false});saveHS();renderHome();}
function delHS(ex,si){const s=ensureHomeSets(ex);if(s.length<=1)return;s.splice(si,1);saveHS();renderHome();}
function setWeek(w){state.week=w;window._hopen=new Set();saveS();renderHome();}
function setDay(d){state.activeDay=d;window._hopen=new Set();saveS();renderHome();}

// ══ WORKOUT MODE ══
let wk={exIdx:0,setIdx:0,elapsed:0,elapsedTimer:null,restTimer:null,restRemain:0,restTotal:0,extraExercises:[]};

function startWorkout(){
  const r=getR();if(!r)return;
  wk.exIdx=0;wk.setIdx=0;wk.elapsed=0;wk.extraExercises=[];
  clearInterval(wk.elapsedTimer);
  wk.elapsedTimer=setInterval(()=>{
    wk.elapsed++;
    const el=document.getElementById('wk-elapsed');
    if(el)el.textContent=`${String(Math.floor(wk.elapsed/60)).padStart(2,'0')}:${String(wk.elapsed%60).padStart(2,'0')}`;
  },1000);
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-workout').classList.add('active');
  renderWorkout();haptic();
}

function getWkExercises(){
  const r=getR();if(!r)return[];
  return [...r.exercises,...wk.extraExercises];
}

function renderWorkout(){
  const exs=getWkExercises();if(!exs.length)return;
  const ex=exs[wk.exIdx];
  const sets=wk.extraExercises.includes(ex)
    ? (homeSets[rKey()+'-extra-'+ex]||[])
    : (homeSets[hsKey(ex)]||[]);

  let totalS=0,doneS=0;
  exs.forEach(e=>{
    const ss=wk.extraExercises.includes(e)?(homeSets[rKey()+'-extra-'+e]||[]):(homeSets[hsKey(e)]||[]);
    totalS+=ss.length;doneS+=ss.filter(x=>x.done).length;
  });
  const pct=totalS>0?Math.round(doneS/totalS*100):0;
  document.getElementById('wk-prog-fill').style.width=pct+'%';
  document.getElementById('wk-prog-lbl').textContent=`${wk.exIdx+1}/${exs.length} 종목`;

  const cs=sets[wk.setIdx]||{weight:0,reps:0,warmup:false};
  const prs=getPRs();const pr=prs[ex];
  const prevRec=getPrevRecord(ex);
  const prevStr=prevRec&&prevRec[wk.setIdx]?`지난번: ${prevRec[wk.setIdx].weight||'?'}kg × ${prevRec[wk.setIdx].reps||'?'}회`:'';
  const pips=sets.map((s,i)=>`<div class="wk-pip ${s.done?'done':i===wk.setIdx?'cur':''} ${s.warmup?'warmup':''}"></div>`).join('');

  let nextHint='';
  if(wk.setIdx<sets.length-1){const ns=sets[wk.setIdx+1];nextHint=`<div class="wk-next"><div><div class="wk-next-lbl">다음 세트</div><div class="wk-next-name">${ex} ${wk.setIdx+2}세트 · ${ns.weight||'?'}kg × ${ns.reps||'?'}회${ns.warmup?' (웜업)':''}</div></div></div>`;}
  else if(wk.exIdx<exs.length-1){const ne=exs[wk.exIdx+1];nextHint=`<div class="wk-next"><div><div class="wk-next-lbl">다음 종목</div><div class="wk-next-name">${ne}</div></div></div>`;}

  const isLast=wk.setIdx>=sets.length-1&&wk.exIdx>=exs.length-1;
  document.getElementById('wk-body').innerHTML=`
    <div class="wk-ex-label">종목 ${wk.exIdx+1}/${exs.length}</div>
    <div class="wk-ex-name">${ex}</div>
    <div class="wk-ex-sub">${wk.setIdx+1} / ${sets.length} 세트</div>
    <div class="wk-pips">${pips}</div>
    <div class="wk-set-card">
      <div class="wk-set-title">${wk.setIdx+1}세트 ${cs.warmup?`<span class="wk-warmup-tag">웜업</span>`:''}</div>
      ${pr?`<div class="wk-pr-badge">🏆 PR ${pr.weight}kg × ${pr.reps}회</div>`:''}
      <div class="wk-set-vals">
        <div class="wk-big-val">${cs.weight||0}</div>
        <span class="wk-big-sep">×</span>
        <div class="wk-big-val">${cs.reps||0}</div>
        <span class="wk-big-unit">회</span>
      </div>
      ${prevStr?`<div class="wk-prev-hint">${prevStr}</div>`:''}
    </div>
    ${nextHint}
    <div class="wk-actions">
      <button class="wk-skip" onclick="skipExercise()">종목 스킵</button>
      <button class="wk-done" onclick="completeSet()">${isLast?'운동 완료 🎉':'세트 완료'}</button>
    </div>
    <button class="wk-add-ex-btn" onclick="openAddExSheet()">+ 종목 추가</button>
    <div style="height:20px;"></div>`;
}

function completeSet(){
  const exs=getWkExercises();const ex=exs[wk.exIdx];
  const isExtra=wk.extraExercises.includes(ex);
  const k=isExtra?(rKey()+'-extra-'+ex):hsKey(ex);
  const sets=homeSets[k]||[];
  if(sets[wk.setIdx]){sets[wk.setIdx].done=true;saveHS();}
  if(!sets[wk.setIdx]?.warmup)checkPR(ex,sets[wk.setIdx]);
  haptic('medium');

  const isLastSet=wk.setIdx>=sets.length-1;
  const isLastEx=wk.exIdx>=exs.length-1;
  if(isLastSet&&isLastEx){clearInterval(wk.elapsedTimer);openRecordSheet();celebrate();return;}
  if(isLastSet){wk.exIdx++;wk.setIdx=0;}else{wk.setIdx++;}
  startRest();
}

function skipExercise(){
  const exs=getWkExercises();
  if(wk.exIdx>=exs.length-1){clearInterval(wk.elapsedTimer);openRecordSheet();return;}
  wk.exIdx++;wk.setIdx=0;renderWorkout();haptic();
}

function checkPR(exName,set){
  if(!set||!set.weight||!set.reps)return;
  const prs=getPRs(),cur=prs[exName];
  const w=parseFloat(set.weight)||0,r=parseInt(set.reps)||0;
  if(!cur||w>cur.weight||(w===cur.weight&&r>cur.reps)){prs[exName]={weight:w,reps:r,date:new Date().toISOString()};savePRs(prs);showToast(`🏆 ${exName} 신기록!`);}
}

function startRest(){
  const exs=getWkExercises();const nextEx=exs[wk.exIdx];
  document.getElementById('rest-next-hint').textContent=`다음: ${nextEx} ${wk.setIdx+1}세트`;
  wk.restTotal=restTime;wk.restRemain=restTime;
  const circ=2*Math.PI*84;
  const ring=document.getElementById('rest-ring');
  ring.style.strokeDasharray=circ;ring.style.strokeDashoffset=0;
  document.getElementById('rest-overlay').classList.add('show');
  updateRestUI();clearInterval(wk.restTimer);
  wk.restTimer=setInterval(()=>{wk.restRemain--;updateRestUI();if(wk.restRemain<=0){skipRest();haptic('heavy');}},1000);
}
function updateRestUI(){document.getElementById('rest-sec').textContent=wk.restRemain;const circ=2*Math.PI*84;document.getElementById('rest-ring').style.strokeDashoffset=circ*(1-wk.restRemain/wk.restTotal);}
function skipRest(){clearInterval(wk.restTimer);document.getElementById('rest-overlay').classList.remove('show');renderWorkout();}
function addRest(s){wk.restRemain+=s;wk.restTotal+=s;updateRestUI();}

function exitWorkout(){
  if(!confirm('운동 모드를 종료할까요?'))return;
  clearInterval(wk.elapsedTimer);clearInterval(wk.restTimer);
  showScreen('home');
}

// add exercise in workout mode
function openAddExSheet(){document.getElementById('addex-sheet').classList.add('open');}
function confirmAddEx(){
  const name=document.getElementById('addex-name').value.trim();
  if(!name){showToast('종목 이름을 입력해주세요');return;}
  const sets=parseInt(document.getElementById('addex-sets').value)||3;
  const weight=document.getElementById('addex-weight').value||'';
  const reps=document.getElementById('addex-reps').value||'';
  const k=rKey()+'-extra-'+name;
  homeSets[k]=Array.from({length:sets},()=>({weight,reps,done:false,warmup:false}));
  wk.extraExercises.push(name);
  saveHS();closeSheet('addex-sheet');
  document.getElementById('addex-name').value='';
  showToast(`${name} 추가됐어요`);renderWorkout();
}

// ══ RECORD SHEET ══

});

function saveRecord(){
  const r=getR();if(!r)return;
  const exs=getWkExercises();
  const exercises={};
  exs.forEach(ex=>{
    const isExtra=wk.extraExercises.includes(ex);
    const k=isExtra?(rKey()+'-extra-'+ex):hsKey(ex);
    const s=(homeSets[k]||[]).filter(s=>s.done);if(s.length)exercises[ex]=s;
  });
  const record={id:Date.now(),date:new Date().toISOString(),week:state.week,day:state.activeDay,sessionName:r.name,exercises,duration:recordElapsed,note:document.getElementById('note-input').value.trim(),photo:pendingPhoto||null};
  const h=getHist();h.unshift(record);saveHist(h);
  // reset done states
  r.exercises.forEach(ex=>{(homeSets[hsKey(ex)]||[]).forEach(s=>s.done=false);});
  wk.extraExercises.forEach(ex=>{delete homeSets[rKey()+'-extra-'+ex];});
  saveHS();
  closeSheet('record-sheet');
  clearInterval(wk.elapsedTimer);clearInterval(wk.restTimer);
  wk={exIdx:0,setIdx:0,elapsed:0,elapsedTimer:null,restTimer:null,restRemain:0,restTotal:0,extraExercises:[]};

}

function changeMonth(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}calSel=null;renderRecords();}

function renderRecords(){
  const body=document.getElementById('records-body');
  const hist=getHist();const now=new Date();
  document.getElementById('cal-label').textContent=`${calYear}년 ${MONTHS[calMonth]}`;
  const dm={};
  hist.forEach(r=>{const d=new Date(r.date);if(d.getFullYear()===calYear&&d.getMonth()===calMonth){const k=d.getDate();if(!dm[k])dm[k]=[];dm[k].push(r);}});
  const mH=hist.filter(r=>{const d=new Date(r.date);return d.getMonth()===calMonth&&d.getFullYear()===calYear;});

  let h=`<div class="stat-row">
    <div class="stat-card"><div class="stat-lbl">이번 달 운동</div><div class="stat-val">${mH.length}</div><div class="stat-sub">회</div></div>
    <div class="stat-card"><div class="stat-lbl">연속 출석</div><div class="stat-val">${getStreak()}</div><div class="stat-sub">일 🔥</div></div>
  </div>`;

  // vol chart
  const days7=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days7.push(d);}
  const vols=days7.map(d=>{const ds=d.toISOString().slice(0,10);return hist.filter(r=>r.date.slice(0,10)===ds).reduce((a,r)=>a+Object.values(r.exercises||{}).reduce((b,ss)=>b+ss.filter(s=>!s.warmup).reduce((c,s)=>c+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),0),0);});
  const maxV=Math.max(...vols,1);
  h+=`<div class="vol-wrap"><div class="vol-title">주간 볼륨 (웜업 제외)</div><div class="vol-bars">${days7.map((d,i)=>{const p=Math.round(vols[i]/maxV*100);return`<div class="vol-col"><div class="vol-bar ${i===6?'today':''}" style="height:${Math.max(p,4)}%"></div><div class="vol-bar-lbl">${DAYS[d.getDay()]}</div></div>`;}).join('')}</div></div>`;

  // calendar
  const fd=new Date(calYear,calMonth,1).getDay();
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const td=(now.getFullYear()===calYear&&now.getMonth()===calMonth)?now.getDate():null;
  h+=`<div class="cal-grid">`;
  DAYS.forEach(d=>h+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<fd;i++)h+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){h+=`<div class="cal-day ${dm[d]?'has-r':''} ${d===td?'today':''} ${d===calSel?'sel':''}" onclick="selDate(${d})"><span class="cal-day-n">${d}</span>${dm[d]?`<span class="cal-dot"></span>`:''}</div>`;}
  h+='</div>';

  if(calSel&&dm[calSel])dm[calSel].forEach(r=>{h+=buildRecCard(r);});
  else if(calSel)h+=`<div class="no-rec">이 날은 운동 기록이 없어요</div>`;
  h+=`<button class="report-btn" onclick="showMonthlyReport()">📊 ${calYear}년 ${MONTHS[calMonth]} 월간 리포트</button>`;
  body.innerHTML=h;
}

function buildRecCard(r){
  const d=new Date(r.date);
  const ds=d.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
  const ts=d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  const dur=r.duration?`⏱ ${Math.floor(r.duration/60)}분 ${r.duration%60}초`:'';
  const prs=getPRs();let exH='';
  Object.entries(r.exercises||{}).forEach(([n,sets])=>{
    const isPR=prs[n]&&sets.filter(s=>!s.warmup).some(s=>parseFloat(s.weight)>=prs[n].weight);
    exH+=`<div class="rec-ex-block"><div class="rec-ex-name">${n}${isPR?`<span class="rec-pr-tag">🏆 PR</span>`:''}</div>`;
    sets.forEach((s,i)=>exH+=`<div class="rec-set-row"><span class="rec-set-n">${i+1}세트</span>${s.warmup?`<span class="warmup-tag">W</span>`:''}<span>${s.weight?s.weight+'kg':''} ${s.reps?'× '+s.reps+'회':''}</span></div>`);
    exH+='</div>';
  });
  return `<div class="rec-card">
    <div class="rec-date">${ds} ${ts}</div>
    <div class="rec-session">${r.sessionName}</div>
    ${dur?`<div class="rec-duration">${dur}</div>`:''}
    ${r.photo?`<img class="rec-photo" src="${r.photo}" alt="">`:''}
    ${r.note?`<div class="rec-note">${r.note}</div>`:''}
    ${exH}
    <div class="rec-acts">
      <button class="rec-act" onclick="shareRecord(${r.id})">📤 공유</button>
      <button class="rec-act" onclick="exportICS(${r.id})">📅 캘린더</button>
      <button class="rec-del" onclick="deleteRecord(${r.id})">삭제</button>
    </div>
  </div>`;
}

function selDate(d){calSel=(calSel===d)?null:d;renderRecords();if(calSel)setTimeout(()=>{const el=document.querySelector('.rec-card');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},60);}

function showMonthlyReport(){
  const mH=getHist().filter(r=>{const d=new Date(r.date);return d.getMonth()===calMonth&&d.getFullYear()===calYear;});
  if(!mH.length){showToast('이 달 기록이 없어요');return;}
  const vol=mH.reduce((a,r)=>a+Object.values(r.exercises||{}).reduce((b,ss)=>b+ss.filter(s=>!s.warmup).reduce((c,s)=>c+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),0),0);
  const ec={};mH.forEach(r=>Object.keys(r.exercises||{}).forEach(e=>{ec[e]=(ec[e]||0)+1;}));
  const top=Object.entries(ec).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>`${k}(${v}회)`).join(', ');
  const text=`📊 ${calYear}년 ${MONTHS[calMonth]} 운동 리포트\n\n운동 일수: ${mH.length}일\n총 볼륨: ${Math.round(vol).toLocaleString()}kg\n많이 한 운동: ${top||'없음'}`;
  if(navigator.share)navigator.share({title:'월간 운동 리포트',text});
  else{navigator.clipboard&&navigator.clipboard.writeText(text);showToast('리포트 복사됨');}
}

function drawBodyGraph(){
  const canvas=document.getElementById('body-graph-canvas');if(!canvas)return;
  const bh=getBodyHist().slice().reverse();
  const hist=getHist().slice().reverse();
  const ctx=canvas.getContext('2d');
  const W=canvas.offsetWidth||300,H=canvas.offsetHeight||140;
  canvas.width=W*2;canvas.height=H*2;ctx.scale(2,2);

  // get data
  let data=[];
  if(activeBodyTab==='vol'){
    data=hist.slice(-14).map(r=>({
      label:new Date(r.date).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}),
      val:Object.values(r.exercises||{}).reduce((a,ss)=>a+ss.filter(s=>!s.warmup).reduce((b,s)=>b+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),0)
    }));
  } else {
    data=bh.slice(-12).map(r=>({
      label:new Date(r.date).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}),
      val:parseFloat(r[activeBodyTab])||0
    }));
  }

  if(data.length<2){ctx.fillStyle='var(--text3)';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('기록이 2개 이상 있어야 그래프가 표시돼요',W/2,H/2);return;}

  const vals=data.map(d=>d.val);
  const min=Math.min(...vals),max=Math.max(...vals);
  const range=max-min||1;
  const pad={t:16,r:8,b:28,l:36};
  const gW=W-pad.l-pad.r,gH=H-pad.t-pad.b;

  // accent color from CSS
  const accent=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#C8FF00';
  const text2=getComputedStyle(document.documentElement).getPropertyValue('--text2').trim()||'#888';
  const border=getComputedStyle(document.documentElement).getPropertyValue('--border').trim()||'#2a2a2a';

  // grid lines
  ctx.strokeStyle=border;ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){const y=pad.t+gH*(1-i/4);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+gW,y);ctx.stroke();}

  // y axis labels
  ctx.fillStyle=text2;ctx.font='9px sans-serif';ctx.textAlign='right';
  for(let i=0;i<=4;i++){const v=min+range*i/4;ctx.fillText(Math.round(v*10)/10,pad.l-4,pad.t+gH*(1-i/4)+3);}

  // line
  ctx.beginPath();ctx.strokeStyle=accent;ctx.lineWidth=2;ctx.lineJoin='round';
  data.forEach((d,i)=>{
    const x=pad.l+(i/(data.length-1))*gW;
    const y=pad.t+gH*(1-(d.val-min)/range);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();

  // dots
  data.forEach((d,i)=>{
    const x=pad.l+(i/(data.length-1))*gW;
    const y=pad.t+gH*(1-(d.val-min)/range);
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=accent;ctx.fill();
  });

  // x labels (first, middle, last)
  ctx.fillStyle=text2;ctx.font='9px sans-serif';ctx.textAlign='center';
  [0,Math.floor(data.length/2),data.length-1].forEach(i=>{
    const x=pad.l+(i/(data.length-1))*gW;
    ctx.fillText(data[i].label,x,H-6);
  });
}

function importAll(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.routines)routines=d.routines;if(d.history)saveHist(d.history);if(d.bodyHistory)saveBodyHist(d.bodyHistory);if(d.prs)savePRs(d.prs);saveR();renderSettings();showToast('복원 완료 ✓');}catch(e){showToast('파일을 읽을 수 없어요');}};rd.readAsText(f);};input.click();
}

// ══ SHARE & ICS ══
function shareRecord(id){
  const r=getHist().find(x=>x.id===id);if(!r)return;
  const t=THEMES.find(x=>x.id===currentTheme)||THEMES[0];
  const canvas=document.getElementById('share-canvas');canvas.width=1080;canvas.height=1080;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle=t.bg;ctx.fillRect(0,0,1080,1080);
  ctx.fillStyle=t.acc;ctx.fillRect(0,0,1080,8);
  ctx.fillStyle=t.acc;ctx.font='bold 52px Arial';ctx.fillText('WORKOUT DONE',60,100);
  const d=new Date(r.date);ctx.fillStyle='#888';ctx.font='28px Arial';ctx.fillText(d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'}),60,148);
  ctx.fillStyle=currentTheme==='white'?'#111':'#f0f0f0';ctx.font='bold 64px Arial';ctx.fillText(r.sessionName,60,240);
  ctx.strokeStyle=t.acc;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(60,270);ctx.lineTo(1020,270);ctx.stroke();
  let y=330;
  Object.entries(r.exercises||{}).forEach(([ex,sets])=>{
    if(y>900)return;
    ctx.fillStyle=currentTheme==='white'?'#111':'#f0f0f0';ctx.font='32px Arial';ctx.fillText('• '+ex,60,y);y+=44;
    ctx.fillStyle='#888';ctx.font='26px Arial';ctx.fillText(sets.filter(s=>!s.warmup).map((s,i)=>`${i+1}세트 ${s.weight||'?'}kg×${s.reps||'?'}회`).join('  '),80,y);y+=40;
  });
  ctx.fillStyle=t.acc;ctx.fillRect(0,1072,1080,8);
  canvas.toBlob(blob=>{
    if(navigator.share&&blob){const file=new File([blob],'workout.png',{type:'image/png'});navigator.share({files:[file],title:'오늘 운동 완료!',text:`${r.sessionName} 완료 💪`}).catch(()=>dlCanvas(canvas));}
    else dlCanvas(canvas);
  },'image/png');
}
function dlCanvas(c){const a=document.createElement('a');a.download='workout.png';a.href=c.toDataURL('image/png');a.click();showToast('이미지 저장 완료 📸');}

function exportICS(id){
  const r=getHist().find(x=>x.id===id);if(!r)return;
  const d=new Date(r.date);
  const ds=[d.getFullYear(),String(d.getMonth()+1).padStart(2,'0'),String(d.getDate()).padStart(2,'0')].join('');
  let desc=`운동: ${r.sessionName}\\n`;
  Object.entries(r.exercises||{}).forEach(([ex,sets])=>{desc+=`${ex}: ${sets.map((s,i)=>`${i+1}세트${s.warmup?'(W)':''} ${s.weight||'?'}kg×${s.reps||'?'}회`).join(', ')}\\n`;});
  if(r.note)desc+=`\\n메모: ${r.note}`;
  const ics=`BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//WorkoutApp//KO\r\nBEGIN:VEVENT\r\nUID:${r.id}@workoutapp\r\nDTSTAMP:${new Date().toISOString().replace(/[-:]/g,'').slice(0,15)}Z\r\nDTSTART;VALUE=DATE:${ds}\r\nDTEND;VALUE=DATE:${ds}\r\nSUMMARY:💪 ${r.sessionName}\r\nDESCRIPTION:${desc}\r\nEND:VEVENT\r\nEND:VCALENDAR`;
  const blob=new Blob([ics],{type:'text/calendar'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`workout-${ds}.ics`;a.click();showToast('캘린더 파일 저장 완료 📅');
}
function deleteRecord(id){if(!confirm('삭제할까요?'))return;saveHist(getHist().filter(x=>x.id!==id));calSel=null;renderRecords();showToast('삭제됐어요');}

// ══ CELEBRATE ══
function celebrate(){
  const el=document.getElementById('celebrate');el.innerHTML='';el.classList.add('show');
  const colors=['#C8FF00','#FF3030','#D4AF37','#fff','#0af'];
  for(let i=0;i<60;i++){const c=document.createElement('div');c.className='confetti';c.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${colors[i%colors.length]};width:${6+Math.random()*6}px;height:${6+Math.random()*6}px;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*.5}s;border-radius:${Math.random()>.5?'50%':'2px'};`;el.appendChild(c);}
  setTimeout(()=>{el.classList.remove('show');el.innerHTML='';},4000);
}

// ══ ONBOARDING ══
let obRestSel=120;
function obGo(step){
  if(step===1){const name=document.getElementById('ob-name').value.trim();if(name)localStorage.setItem('userName',name);}
  for(let i=0;i<3;i++){document.getElementById('ob-step-'+i).classList.toggle('show',i===step);document.getElementById('od'+i).classList.toggle('on',i===step);}
}
function obRest(s){obRestSel=s;document.querySelectorAll('.ob-rest-opt').forEach((el,i)=>el.classList.toggle('on',[60,120,300][i]===s));}
function obFinish(){restTime=obRestSel;localStorage.setItem('restTime',String(obRestSel));localStorage.setItem('ob_done','1');document.getElementById('ob-overlay').classList.remove('show');renderHome();}

// ══ UTILS ══
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function haptic(type='light'){try{if(navigator.vibrate)navigator.vibrate(type==='heavy'?[30,10,30]:type==='medium'?20:10);}catch(e){}}
['record-sheet','edit-sheet','addex-sheet','inbody-sheet'].forEach(id=>document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeSheet(id);}));

// ══ INIT ══
applyTheme(currentTheme);
loadData();
state.activeDay=new Date().getDay();
saveS();

if(!localStorage.getItem('ob_done')){
  document.getElementById('ob-overlay').classList.add('show');
  obRest(restTime);
} else {
  renderHome();
}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
