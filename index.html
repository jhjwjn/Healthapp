<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="운동루틴">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>우리 운동 루틴</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a; --surface:#141414; --surface2:#1e1e1e; --border:#2a2a2a;
  --accent:#C8FF00; --accent-dim:rgba(200,255,0,0.12);
  --text:#f0f0f0; --text2:#888; --text3:#555; --red:#ff4444;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100%;padding-top:var(--safe-top);}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--accent);}
.topbar-sub{font-size:12px;color:var(--text2);margin-top:1px;}
.pill-btn{height:32px;padding:0 12px;border-radius:20px;border:1px solid rgba(200,255,0,0.3);background:var(--accent-dim);color:var(--accent);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.outline-btn{height:32px;padding:0 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}

/* scroll body */
.scroll-body{flex:1;overflow-y:auto;padding:16px 20px;padding-bottom:calc(88px + var(--safe-bottom));}
.scroll-body::-webkit-scrollbar{display:none;}

/* week toggle */
.week-toggle{display:flex;gap:8px;margin-bottom:20px;}
.week-btn{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;}
.week-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:500;}

/* day tabs */
.day-tabs{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;}
.day-tab .dl{font-size:13px;font-weight:500;color:var(--text2);}
.day-tab .dd{width:5px;height:5px;border-radius:50%;background:transparent;}
.day-tab.hw .dd{background:var(--text3);}
.day-tab.active{border-color:var(--accent);background:var(--accent-dim);}
.day-tab.active .dl{color:var(--accent);}
.day-tab.active .dd{background:var(--accent);}

/* session header */
.session-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:16px;}
.session-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;}
.session-tag{display:inline-block;margin-top:4px;padding:3px 10px;border-radius:20px;background:var(--accent-dim);border:1px solid rgba(200,255,0,0.3);font-size:11px;color:var(--accent);}

/* progress */
.progress-wrap{margin-bottom:20px;}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px;}
.progress-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}

/* exercise cards */
.ex-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;transition:border-color .2s;}
.ex-card.done{border-color:rgba(200,255,0,0.3);}
.ex-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
.ex-chk{width:24px;height:24px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--text3);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer;}
.ex-chk.checked{background:var(--accent);border-color:var(--accent);}
.ex-chk svg{display:none;}
.ex-chk.checked svg{display:block;}
.ex-name{flex:1;font-size:15px;font-weight:500;}
.ex-sum{font-size:12px;color:var(--text2);}
.ex-arr{font-size:18px;color:var(--text3);transition:transform .2s;}
.ex-card.expanded .ex-arr{transform:rotate(180deg);}
.ex-detail{border-top:1px solid var(--border);padding:14px 16px;display:none;}
.ex-card.expanded .ex-detail{display:block;}

/* set rows */
.set-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.set-num{font-size:12px;color:var(--text3);width:30px;flex-shrink:0;}
.set-grp{display:flex;align-items:center;gap:6px;flex:1;}
.set-field{display:flex;flex-direction:column;gap:3px;flex:1;}
.set-field label{font-size:10px;color:var(--text3);}
.set-field input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;width:100%;outline:none;transition:border-color .15s;}
.set-field input:focus{border-color:var(--accent);}
.set-chk{width:32px;height:32px;border-radius:8px;flex-shrink:0;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:16px;}
.set-chk.done{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.add-set-btn{width:100%;padding:8px;border-radius:8px;margin-top:4px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* rest day */
.rest-day{text-align:center;padding:40px 0 20px;color:var(--text3);}
.rest-icon{font-size:48px;margin-bottom:12px;}
.rest-day p{font-size:15px;margin-bottom:20px;}

/* finish btn */
.finish-wrap{position:fixed;bottom:0;left:0;right:0;padding:12px 20px;padding-bottom:calc(12px + var(--safe-bottom));background:linear-gradient(to top,var(--bg) 55%,transparent);}
.finish-btn{width:100%;padding:16px;border-radius:14px;background:var(--accent);border:none;color:#0a0a0a;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .15s;}
.finish-btn:disabled{opacity:.3;}
.finish-btn:active{opacity:.8;}

/* history */
.history-empty{text-align:center;padding:60px 0;color:var(--text3);font-size:14px;}
.hist-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;}
.hist-date{font-size:12px;color:var(--accent);font-weight:500;margin-bottom:6px;}
.hist-session{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:10px;}
.hist-photo{width:100%;border-radius:10px;margin-bottom:10px;object-fit:cover;max-height:220px;display:block;}
.hist-note{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap;margin-bottom:8px;}
.hist-summary{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.hist-ex{font-size:13px;color:var(--text2);margin-bottom:4px;}
.hist-ex strong{color:var(--text);font-weight:500;}

/* bottom nav */
.bottom-nav{display:flex;border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);flex-shrink:0;background:var(--bg);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:10px;font-family:'Noto Sans KR',sans-serif;transition:color .15s;}
.nav-btn svg{width:22px;height:22px;}
.nav-btn.active{color:var(--accent);}

/* modals */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:16px auto 0;flex-shrink:0;}
.modal-hdr{padding:14px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;}
.modal-body{flex:1;overflow-y:auto;padding:16px 20px;}
.modal-body::-webkit-scrollbar{display:none;}
.modal-ftr{padding:12px 20px;padding-bottom:calc(12px + var(--safe-bottom));border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:10px;background:var(--surface);}
.m-cancel{flex:1;padding:14px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:15px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.m-save{flex:2;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#0a0a0a;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* record modal */
.sum-block{background:var(--surface2);border-radius:12px;padding:14px;margin-bottom:16px;}
.sum-label{font-size:11px;color:var(--text3);letter-spacing:.08em;margin-bottom:10px;text-transform:uppercase;}
.sum-ex-row{margin-bottom:8px;}
.sum-ex-name{font-size:14px;font-weight:500;margin-bottom:2px;}
.sum-ex-sets{font-size:12px;color:var(--text2);}
.photo-area{border:1.5px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;margin-bottom:16px;display:block;transition:border-color .15s;}
.photo-area p{font-size:13px;color:var(--text3);margin-top:6px;}
.photo-prev{width:100%;border-radius:10px;margin-bottom:16px;display:none;}
.photo-prev.visible{display:block;}
.note-area{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'Noto Sans KR',sans-serif;resize:none;outline:none;line-height:1.6;margin-bottom:8px;}
.note-area:focus{border-color:var(--accent);}

/* edit modal */
.edit-sec{margin-bottom:24px;}
.edit-sec-title{font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.edit-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.edit-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;}
.edit-input:focus{border-color:var(--accent);}
.del-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.del-btn:active{border-color:var(--red);color:var(--red);}
.edit-add-btn{width:100%;padding:10px;border-radius:10px;margin-top:4px;border:1px dashed var(--border);background:transparent;color:var(--text3);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.name-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:15px;font-weight:500;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;margin-bottom:6px;}
.name-input:focus{border-color:var(--accent);}
.danger-btn{width:100%;padding:12px;border-radius:10px;border:1px solid var(--red);background:transparent;color:var(--red);font-size:14px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:8px;}

/* toast */
.toast{position:fixed;bottom:calc(88px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);padding:10px 20px;border-radius:20px;font-size:13px;color:var(--text);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">

  <!-- TODAY -->
  <div class="screen active" id="screen-today">
    <div class="topbar">
      <div>
        <div class="topbar-title">WORKOUT</div>
        <div class="topbar-sub" id="today-date"></div>
      </div>
      <button class="pill-btn" id="week-ind">1주차</button>
    </div>
    <div class="scroll-body" id="today-body"></div>
    <div class="finish-wrap">
      <button class="finish-btn" id="finish-btn" disabled>운동 완료 기록하기</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="screen" id="screen-history">
    <div class="topbar">
      <div><div class="topbar-title">RECORDS</div><div class="topbar-sub">운동 기록</div></div>
    </div>
    <div class="scroll-body" id="history-body"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="showScreen('today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
      </svg>오늘
    </button>
    <button class="nav-btn" id="nav-history" onclick="showScreen('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/>
      </svg>기록
    </button>
  </nav>
</div>

<!-- RECORD MODAL -->
<div class="modal-overlay" id="record-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-hdr"><div class="modal-title">오늘 운동 기록</div></div>
    <div class="modal-body">
      <div class="sum-block" id="modal-summary"></div>
      <img class="photo-prev" id="photo-prev" src="" alt="운동 사진">
      <label class="photo-area" for="photo-input">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="1.5">
          <rect x="3" y="5" width="18" height="15" rx="2"/>
          <circle cx="8.5" cy="10.5" r="1.5"/><polyline points="21,15 16,10 5,21"/>
        </svg>
        <p id="photo-label">사진 첨부 (선택)</p>
        <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none">
      </label>
      <textarea class="note-area" id="note-input" rows="3" placeholder="오늘 운동 소감이나 특이사항 (선택)"></textarea>
    </div>
    <div class="modal-ftr">
      <button class="m-cancel" onclick="closeModal('record-modal')">취소</button>
      <button class="m-save" onclick="saveRecord()">저장하기</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-hdr"><div class="modal-title" id="edit-title">루틴 편집</div></div>
    <div class="modal-body" id="edit-body"></div>
    <div class="modal-ftr">
      <button class="m-cancel" onclick="closeModal('edit-modal')">취소</button>
      <button class="m-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const DEFAULT_ROUTINES = {
  '1-1':{name:'가슴 너비',exercises:['펙덱 플라이','케이블 플라이','덤벨 프레스','인클라인 벤치프레스']},
  '1-3':{name:'등 너비',exercises:['랫풀다운 (중립)','랫풀다운 (와이드)','암풀다운','덤벨로우']},
  '1-5':{name:'하체',exercises:['스쿼트','레그 익스텐션','런지']},
  '1-0':{name:'어깨',exercises:['사이드 레터럴 레이즈','페이스 폴','밀리터리 프레스']},
  '2-1':{name:'가슴 두께',exercises:['인클라인 벤치 프레스','인클라인 덤벨 프레스','펙덱 플라이']},
  '2-3':{name:'등 두께',exercises:['바벨로우','T바로우','덤벨로우','랫풀다운']},
  '2-5':{name:'하체',exercises:['스쿼트','레그 익스텐션','런지']},
  '2-0':{name:'어깨',exercises:['사이드 레터럴 레이즈','페이스 폴','밀리터리 프레스']},
};
const DAYS = ['일','월','화','수','목','금','토'];
const DAYS_FULL = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

// ── STATE ──
let routines = {};
let state = {week:1, activeDay:new Date().getDay(), sets:{}};

function loadData() {
  try { const r=localStorage.getItem('rt_v3'); routines = r ? JSON.parse(r) : JSON.parse(JSON.stringify(DEFAULT_ROUTINES)); }
  catch(e) { routines = JSON.parse(JSON.stringify(DEFAULT_ROUTINES)); }
  try { const s=localStorage.getItem('st_v3'); if(s) Object.assign(state,JSON.parse(s)); }
  catch(e){}
}
function saveR() { try{localStorage.setItem('rt_v3',JSON.stringify(routines));}catch(e){} }
function saveS() { try{localStorage.setItem('st_v3',JSON.stringify(state));}catch(e){} }
function getHist() { try{return JSON.parse(localStorage.getItem('hist_v3')||'[]');}catch(e){return[];} }
function saveHist(h) { try{localStorage.setItem('hist_v3',JSON.stringify(h));}catch(e){} }

function rKey() { return state.week+'-'+state.activeDay; }
function getR()  { return routines[rKey()]||null; }
function sKey(ex){ return rKey()+'-'+ex; }
function ensureSets(ex) {
  const k=sKey(ex);
  if(!state.sets[k]) state.sets[k]=[{reps:'',weight:'',done:false}];
  return state.sets[k];
}

// ── SCREENS ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name==='history') renderHistory();
}

// ── TODAY ──
function renderToday() {
  const body = document.getElementById('today-body');
  const routine = getR();
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'});
  document.getElementById('week-ind').textContent = state.week+'주차';

  let h = '';
  // week toggle
  h += `<div class="week-toggle">
    <button class="week-btn ${state.week===1?'active':''}" onclick="setWeek(1)">1주차</button>
    <button class="week-btn ${state.week===2?'active':''}" onclick="setWeek(2)">2주차</button>
  </div>`;
  // day tabs
  h += '<div class="day-tabs">';
  DAYS.forEach((d,i)=>{
    const hw = !!routines[state.week+'-'+i];
    h += `<button class="day-tab ${hw?'hw':''} ${i===state.activeDay?'active':''}" onclick="setDay(${i})">
      <span class="dl">${d}</span><span class="dd"></span></button>`;
  });
  h += '</div>';

  if(!routine) {
    h += `<div class="rest-day"><div class="rest-icon">🛌</div>
      <p>등록된 루틴이 없어요</p>
      <button class="outline-btn" style="margin:0 auto;" onclick="openEditModal()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>이 날 루틴 추가
      </button></div>`;
    document.getElementById('finish-btn').disabled = true;
    body.innerHTML = h; return;
  }

  // session header
  h += `<div class="session-header">
    <div>
      <div class="session-name">${routine.name}</div>
      <span class="session-tag">${DAYS_FULL[state.activeDay]} · ${state.week}주차</span>
    </div>
    <button class="outline-btn" onclick="openEditModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>편집
    </button>
  </div>`;

  // progress
  const exs = routine.exercises;
  const doneC = exs.filter(ex=>{const s=state.sets[sKey(ex)]||[];return s.length>0&&s.every(s=>s.done);}).length;
  const pct = exs.length>0 ? Math.round(doneC/exs.length*100) : 0;
  h += `<div class="progress-wrap">
    <div class="progress-info"><span>${doneC}/${exs.length} 종목 완료</span><span>${pct}%</span></div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;

  // exercise cards
  exs.forEach((ex,ei)=>{
    const sets = ensureSets(ex);
    const allDone = sets.length>0&&sets.every(s=>s.done);
    const doneSets = sets.filter(s=>s.done).length;
    const sum = doneSets>0 ? `${doneSets}세트 완료` : `${sets.length}세트 예정`;
    const safe = ex.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

    h += `<div class="ex-card ${allDone?'done':''}" id="ec${ei}">
      <div class="ex-header" onclick="toggleExpand(${ei})">
        <div class="ex-chk ${allDone?'checked':''}" onclick="event.stopPropagation();toggleExChk('${safe}')">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <polyline points="2,6 5,9 10,3" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="ex-name">${ex}</div>
        <div class="ex-sum">${sum}</div>
        <div class="ex-arr">⌄</div>
      </div>
      <div class="ex-detail">`;

    sets.forEach((set,si)=>{
      h += `<div class="set-row">
        <div class="set-num">${si+1}세트</div>
        <div class="set-grp">
          <div class="set-field"><label>중량 (kg)</label>
            <input type="number" inputmode="decimal" placeholder="0" value="${set.weight}"
              onchange="updSet('${safe}',${si},'weight',this.value)"></div>
          <div class="set-field"><label>횟수</label>
            <input type="number" inputmode="numeric" placeholder="0" value="${set.reps}"
              onchange="updSet('${safe}',${si},'reps',this.value)"></div>
          <button class="set-chk ${set.done?'done':''}" onclick="togSetDone('${safe}',${si})">${set.done?'✓':'○'}</button>
        </div></div>`;
    });

    h += `<button class="add-set-btn" onclick="addSet('${safe}')">+ 세트 추가</button>
      </div></div>`;
  });

  body.innerHTML = h;
  if(window._exp) window._exp.forEach(ei=>{const c=document.getElementById('ec'+ei);if(c)c.classList.add('expanded');});
  document.getElementById('finish-btn').disabled = !exs.some(ex=>(state.sets[sKey(ex)]||[]).some(s=>s.done));
}

function toggleExpand(ei) {
  const c=document.getElementById('ec'+ei); c.classList.toggle('expanded');
  if(!window._exp) window._exp=new Set();
  c.classList.contains('expanded') ? window._exp.add(ei) : window._exp.delete(ei);
}
function toggleExChk(ex) { const s=ensureSets(ex),all=s.every(x=>x.done); s.forEach(x=>x.done=!all); saveS();renderToday(); }
function updSet(ex,si,f,v) { const k=sKey(ex); if(state.sets[k]?.[si]){state.sets[k][si][f]=v;saveS();} }
function togSetDone(ex,si) { const k=sKey(ex); if(state.sets[k]?.[si]){state.sets[k][si].done=!state.sets[k][si].done;saveS();renderToday();} }
function addSet(ex) {
  const k=sKey(ex); if(!state.sets[k]) state.sets[k]=[];
  const l=state.sets[k][state.sets[k].length-1];
  state.sets[k].push({reps:l?.reps||'',weight:l?.weight||'',done:false}); saveS();renderToday();
}
function setWeek(w){state.week=w;window._exp=new Set();saveS();renderToday();}
function setDay(d){state.activeDay=d;window._exp=new Set();saveS();renderToday();}

// ── EDIT MODAL ──
let editDraft = null;
function openEditModal() {
  const r = getR();
  editDraft = r ? {name:r.name,exercises:[...r.exercises]} : {name:'',exercises:[]};
  document.getElementById('edit-title').textContent = `${DAYS_FULL[state.activeDay]} ${state.week}주차 편집`;
  renderEditBody();
  document.getElementById('edit-modal').classList.add('open');
}
function renderEditBody() {
  const b = document.getElementById('edit-body');
  let h = `<div class="edit-sec">
    <div class="edit-sec-title">세션 이름</div>
    <input class="name-input" id="edit-name" type="text" placeholder="예: 가슴 너비" value="${editDraft.name.replace(/"/g,'&quot;')}" oninput="editDraft.name=this.value">
  </div>
  <div class="edit-sec">
    <div class="edit-sec-title">운동 목록</div>`;
  editDraft.exercises.forEach((ex,i)=>{
    h += `<div class="edit-row">
      <input class="edit-input" type="text" value="${ex.replace(/"/g,'&quot;')}" placeholder="운동 이름"
        oninput="editDraft.exercises[${i}]=this.value">
      <button class="del-btn" onclick="delEx(${i})">✕</button>
    </div>`;
  });
  h += `<button class="edit-add-btn" onclick="addEx()">+ 운동 추가</button>`;
  if(routines[rKey()]) {
    h += `<div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border);">
      <button class="danger-btn" onclick="delRoutine()">이 날 루틴 삭제</button>
    </div>`;
  }
  h += '</div>';
  b.innerHTML = h;
}
function addEx() {
  editDraft.exercises.push(''); renderEditBody();
  setTimeout(()=>{const ins=document.querySelectorAll('.edit-input');if(ins.length)ins[ins.length-1].focus();},50);
}
function delEx(i) { editDraft.exercises.splice(i,1); renderEditBody(); }
function delRoutine() {
  if(!confirm('이 날 루틴을 삭제할까요?')) return;
  delete routines[rKey()]; saveR(); closeModal('edit-modal'); window._exp=new Set(); renderToday();
  showToast('루틴을 삭제했어요');
}
function saveEdit() {
  const name = editDraft.name.trim();
  const exs = editDraft.exercises.map(e=>e.trim()).filter(Boolean);
  if(!name){showToast('세션 이름을 입력해주세요');return;}
  if(!exs.length){showToast('운동을 하나 이상 추가해주세요');return;}
  routines[rKey()] = {name,exercises:exs}; saveR();
  closeModal('edit-modal'); window._exp=new Set(); renderToday();
  showToast('루틴이 저장됐어요 ✓');
}

// ── RECORD MODAL ──
let pendingPhoto = null;
function buildSumHTML() {
  const r=getR(); if(!r) return '';
  let h=`<div class="sum-label">${r.name} · ${state.week}주차 ${DAYS_FULL[state.activeDay]}</div>`;
  r.exercises.forEach(ex=>{
    const sets=(state.sets[sKey(ex)]||[]).filter(s=>s.done); if(!sets.length) return;
    const strs=sets.map((s,i)=>{let t=`${i+1}세트`;if(s.weight)t+=` ${s.weight}kg`;if(s.reps)t+=` × ${s.reps}회`;return t;}).join(' · ');
    h+=`<div class="sum-ex-row"><div class="sum-ex-name">${ex}</div><div class="sum-ex-sets">${strs}</div></div>`;
  });
  return h;
}
document.getElementById('finish-btn').addEventListener('click',()=>{
  document.getElementById('modal-summary').innerHTML=buildSumHTML();
  document.getElementById('note-input').value='';
  document.getElementById('photo-prev').classList.remove('visible');
  document.getElementById('photo-label').textContent='사진 첨부 (선택)';
  pendingPhoto=null;
  document.getElementById('record-modal').classList.add('open');
});
document.getElementById('photo-input').addEventListener('change',function(){
  const f=this.files[0]; if(!f) return;
  const reader=new FileReader();
  reader.onload=e=>{
    pendingPhoto=e.target.result;
    const p=document.getElementById('photo-prev');
    p.src=pendingPhoto; p.classList.add('visible');
    document.getElementById('photo-label').textContent='사진 변경';
  };
  reader.readAsDataURL(f);
});
function saveRecord() {
  const r=getR(); if(!r) return;
  const exercises={};
  r.exercises.forEach(ex=>{const s=(state.sets[sKey(ex)]||[]).filter(s=>s.done);if(s.length)exercises[ex]=s;});
  const record={id:Date.now(),date:new Date().toISOString(),week:state.week,day:state.activeDay,
    sessionName:r.name,exercises,note:document.getElementById('note-input').value.trim(),photo:pendingPhoto||null};
  const h=getHist(); h.unshift(record); saveHist(h);
  closeModal('record-modal');
  showToast('저장 완료! 기록 탭에서 확인하세요 💪');
  setTimeout(()=>showScreen('history'),900);
}

// ── HISTORY ──
function renderHistory() {
  const body=document.getElementById('history-body');
  const hist=getHist();
  if(!hist.length){body.innerHTML='<div class="history-empty">아직 기록이 없어요<br>운동 완료 후 첫 기록을 남겨보세요!</div>';return;}
  body.innerHTML=hist.map(r=>{
    const d=new Date(r.date);
    const ds=d.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
    const ts=d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    let ex='';
    Object.entries(r.exercises).forEach(([name,sets])=>{
      const strs=sets.map((s,i)=>{let t=`${i+1}세트`;if(s.weight)t+=` ${s.weight}kg`;if(s.reps)t+=`×${s.reps}회`;return t;}).join(' · ');
      ex+=`<div class="hist-ex"><strong>${name}</strong>&ensp;${strs}</div>`;
    });
    return `<div class="hist-card">
      <div class="hist-date">${ds} ${ts}</div>
      <div class="hist-session">${r.sessionName}</div>
      ${r.photo?`<img class="hist-photo" src="${r.photo}" alt="운동 사진">`:''}
      ${r.note?`<div class="hist-note">${r.note}</div>`:''}
      <div class="hist-summary">${ex}</div>
    </div>`;
  }).join('');
}

// ── UTILS ──
function closeModal(id){document.getElementById(id).classList.remove('open');}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
['record-modal','edit-modal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModal(id);});
});

// ── INIT ──
loadData(); renderToday();
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
